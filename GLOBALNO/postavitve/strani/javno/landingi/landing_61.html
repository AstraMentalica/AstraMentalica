<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraMentalica - Ancient Wisdom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Almendra:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0a08;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Ancient Forest Background */
        .forest-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 69, 19, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(34, 56, 42, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(61, 43, 31, 0.1) 0%, transparent 60%),
                linear-gradient(135deg, rgba(12, 10, 8, 0.9) 0%, rgba(25, 20, 15, 0.8) 100%);
            z-index: -3;
        }

        /* Organic Sacred Patterns */
        .sacred-patterns {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            opacity: 0.12;
        }

        /* Celtic Triple Spiral */
        .triple-spiral {
            position: absolute;
            width: 180px;
            height: 180px;
            top: 15%;
            left: 8%;
            animation: sacred-rotate 40s linear infinite;
        }

        .spiral-arm {
            stroke: #d4af37;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            animation: spiral-glow 5s ease-in-out infinite;
        }

        @keyframes spiral-glow {
            0%, 100% { stroke: #d4af37; stroke-width: 2.5; opacity: 0.8; }
            50% { stroke: #f4e4bc; stroke-width: 3.5; opacity: 1; }
        }

        /* Fibonacci Spiral */
        .fibonacci-spiral {
            position: absolute;
            width: 220px;
            height: 220px;
            top: 60%;
            right: 10%;
            animation: sacred-rotate 60s linear infinite reverse;
        }

        .fib-curve {
            stroke: #8b4513;
            stroke-width: 3;
            fill: none;
            animation: fib-breathe 7s ease-in-out infinite;
        }

        @keyframes fib-breathe {
            0%, 100% { stroke-opacity: 0.6; transform: scale(1); }
            50% { stroke-opacity: 1; transform: scale(1.08); }
        }

        /* Flowing Vine Pattern */
        .vine-pattern {
            position: absolute;
            width: 300px;
            height: 400px;
            top: 20%;
            right: 25%;
        }

        .vine-stem {
            stroke: rgba(34, 89, 56, 0.7);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            animation: vine-sway 8s ease-in-out infinite;
        }

        .vine-leaf {
            fill: rgba(139, 69, 19, 0.5);
            animation: leaf-flutter 6s ease-in-out infinite;
        }

        @keyframes vine-sway {
            0%, 100% { transform: rotate(-2deg) scale(1); }
            50% { transform: rotate(2deg) scale(1.03); }
        }

        @keyframes leaf-flutter {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 0.8; }
        }

        /* Sacred Mandala */
        .mandala {
            position: absolute;
            width: 200px;
            height: 200px;
            bottom: 15%;
            left: 15%;
        }

        .mandala-layer {
            stroke: none;
            fill: rgba(212, 175, 55, 0.15);
            animation: mandala-pulse 12s ease-in-out infinite;
        }

        .mandala-outline {
            stroke: rgba(139, 69, 19, 0.6);
            stroke-width: 1.5;
            fill: none;
            animation: mandala-rotate 30s linear infinite;
        }

        @keyframes mandala-pulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.05); }
        }

        @keyframes mandala-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Celtic Infinity Knot */
        .infinity-knot {
            position: absolute;
            width: 160px;
            height: 100px;
            top: 45%;
            left: 5%;
        }

        .knot-flow {
            stroke: #d4af37;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            animation: flow-energy 6s ease-in-out infinite;
        }

        @keyframes flow-energy {
            0%, 100% { stroke-dasharray: 0 300; }
            50% { stroke-dasharray: 150 150; }
        }

        /* Water Flow Pattern */
        .water-flow {
            position: absolute;
            width: 250px;
            height: 180px;
            bottom: 35%;
            right: 30%;
        }

        .water-wave {
            stroke: rgba(70, 130, 180, 0.4);
            stroke-width: 2.5;
            fill: none;
            animation: wave-flow 4s ease-in-out infinite;
        }

        @keyframes wave-flow {
            0%, 100% { stroke-dasharray: 0 200; opacity: 0.4; }
            50% { stroke-dasharray: 100 100; opacity: 0.8; }
        }

        /* Tree of Life (Organic Version) */
        .organic-tree {
            position: absolute;
            width: 180px;
            height: 280px;
            top: 10%;
            right: 5%;
        }

        .tree-branch {
            stroke: rgba(139, 69, 19, 0.7);
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            animation: branch-growth 10s ease-in-out infinite;
        }

        .tree-circle {
            fill: rgba(212, 175, 55, 0.3);
            stroke: rgba(212, 175, 55, 0.8);
            stroke-width: 1.5;
            animation: circle-glow 8s ease-in-out infinite;
        }

        @keyframes branch-growth {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        @keyframes circle-glow {
            0%, 100% { fill-opacity: 0.3; stroke-opacity: 0.8; }
            50% { fill-opacity: 0.6; stroke-opacity: 1; }
        }

        /* Flowing Energy Streams */
        .energy-stream {
            position: absolute;
            animation: energy-flow 15s linear infinite;
        }

        .stream-particle {
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #d4af37, transparent);
            border-radius: 50%;
            position: absolute;
            animation: particle-float 8s ease-in-out infinite;
        }

        @keyframes energy-flow {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-100px) rotate(360deg); }
        }

        @keyframes particle-float {
            0%, 100% { transform: scale(0.8) translateX(0); opacity: 0.6; }
            50% { transform: scale(1.2) translateX(20px); opacity: 1; }
        }

        @keyframes sacred-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ANIMACIJE ZA KULTURNE ELEMENTE */
        
        /* Bambus animacije */
        .bamboo-stalk {
            animation: bamboo-sway 8s ease-in-out infinite;
            transform-origin: bottom center;
        }
        
        @keyframes bamboo-sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(1deg); }
            75% { transform: rotate(-1deg); }
        }
        
        /* Buda aura */
        .buddha-figure {
            animation: buddha-meditation 10s ease-in-out infinite;
        }
        
        @keyframes buddha-meditation {
            0%, 100% { 
                fill-opacity: 0.6; 
                stroke-opacity: 0.4; 
                transform: scale(1); 
            }
            50% { 
                fill-opacity: 0.8; 
                stroke-opacity: 0.7; 
                transform: scale(1.02); 
            }
        }
        
        /* Piramide animacije */
        .pyramids polygon {
            animation: pyramid-glow 12s ease-in-out infinite;
        }
        
        @keyframes pyramid-glow {
            0%, 100% { 
                fill-opacity: 0.4; 
                stroke-opacity: 0.6; 
            }
            50% { 
                fill-opacity: 0.6; 
                stroke-opacity: 0.9; 
            }
        }
        
        /* Faraon animacije */
        .pharaoh-figure {
            animation: pharaoh-power 15s ease-in-out infinite;
        }
        
        @keyframes pharaoh-power {
            0%, 100% { 
                stroke-opacity: 0.8; 
                filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)); 
            }
            50% { 
                stroke-opacity: 1; 
                filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8)); 
            }
        }
        
        /* Hieroglifi animacije */
        .hieroglyphs svg path,
        .hieroglyphs svg line,
        .hieroglyphs svg circle,
        .hieroglyphs svg ellipse,
        .hieroglyphs svg rect,
        .hieroglyphs svg polygon {
            animation: hieroglyph-pulse 6s ease-in-out infinite;
        }
        
        .hieroglyphs svg path:nth-child(2) { animation-delay: 0.5s; }
        .hieroglyphs svg path:nth-child(3) { animation-delay: 1s; }
        .hieroglyphs svg path:nth-child(4) { animation-delay: 1.5s; }
        
        @keyframes hieroglyph-pulse {
            0%, 100% { stroke-opacity: 0.7; }
            50% { stroke-opacity: 1; }
        }
        
        /* Rune animacije */
        .rune-symbols g {
            animation: rune-energy 8s ease-in-out infinite;
        }
        
        .rune-symbols g:nth-child(1) { animation-delay: 0s; }
        .rune-symbols g:nth-child(2) { animation-delay: 0.5s; }
        .rune-symbols g:nth-child(3) { animation-delay: 1s; }
        .rune-symbols g:nth-child(4) { animation-delay: 1.5s; }
        .rune-symbols g:nth-child(5) { animation-delay: 2s; }
        .rune-symbols g:nth-child(6) { animation-delay: 2.5s; }
        .rune-symbols g:nth-child(7) { animation-delay: 3s; }
        .rune-symbols g:nth-child(8) { animation-delay: 3.5s; }
        
        @keyframes rune-energy {
            0%, 100% { 
                stroke-opacity: 0.8; 
                transform: scale(1); 
            }
            50% { 
                stroke-opacity: 1; 
                transform: scale(1.05); 
            }
        }
        
        /* Nordijski simboli animacije */
        .nordic-symbols g {
            animation: nordic-power 10s ease-in-out infinite;
        }
        
        .nordic-symbols g:nth-child(1) { animation-delay: 0s; }
        .nordic-symbols g:nth-child(2) { animation-delay: 1s; }
        .nordic-symbols g:nth-child(3) { animation-delay: 2s; }
        .nordic-symbols g:nth-child(4) { animation-delay: 3s; }
        
        @keyframes nordic-power {
            0%, 100% { 
                opacity: 0.8; 
                transform: scale(1) rotate(0deg); 
            }
            50% { 
                opacity: 1; 
                transform: scale(1.08) rotate(5deg); 
            }
        }

        /* Main Container */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
        }

        /* Mystical Aura */
        .mystical-aura {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 30%, rgba(212, 175, 55, 0.05) 50%, transparent 70%);
            animation: aura-pulse 8s ease-in-out infinite;
        }

        .mystical-aura::before {
            content: '';
            position: absolute;
            top: -30px;
            left: -30px;
            right: -30px;
            bottom: -30px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 40%, rgba(139, 69, 19, 0.08) 60%, transparent 80%);
            animation: aura-pulse 8s ease-in-out infinite 1s;
        }

        @keyframes aura-pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Ancient Title - VIDNO IN LEPO */
        .title {
            font-size: clamp(3.5rem, 8vw, 7.5rem);
            font-weight: 700;
            text-align: center;
            position: relative;
            margin-bottom: 2rem;
            color: #ffd700;
            letter-spacing: 0.15em;
            font-family: 'Almendra', serif;
            text-shadow: 
                0 0 20px rgba(255, 215, 0, 0.8),
                0 0 40px rgba(212, 175, 55, 0.6),
                2px 2px 4px rgba(139, 69, 19, 0.8),
                0 0 60px rgba(255, 215, 0, 0.4);
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.7));
            animation: elegant-glow 6s ease-in-out infinite;
        }

        .title::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            background: radial-gradient(ellipse, rgba(255, 215, 0, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: gentle-aura 6s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes gentle-aura {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        /* Individual letter styling - ELEGANTNO */
        .title-letter {
            display: inline-block;
            animation: gentle-float 6s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        .title-letter:nth-child(1) { animation-delay: 0.1s; }
        .title-letter:nth-child(2) { animation-delay: 0.2s; }
        .title-letter:nth-child(3) { animation-delay: 0.3s; }
        .title-letter:nth-child(4) { animation-delay: 0.4s; }
        .title-letter:nth-child(5) { animation-delay: 0.5s; }
        .title-letter:nth-child(6) { animation-delay: 0.6s; }
        .title-letter:nth-child(7) { animation-delay: 0.7s; }
        .title-letter:nth-child(8) { animation-delay: 0.8s; }
        .title-letter:nth-child(9) { animation-delay: 0.9s; }
        .title-letter:nth-child(10) { animation-delay: 1s; }
        .title-letter:nth-child(11) { animation-delay: 1.1s; }
        .title-letter:nth-child(12) { animation-delay: 1.2s; }

        .title-letter:hover {
            transform: scale(1.15) translateY(-5px);
            text-shadow: 
                0 0 30px rgba(255, 215, 0, 0.9),
                0 0 60px rgba(212, 175, 55, 0.7),
                3px 3px 6px rgba(139, 69, 19, 0.8);
        }

        @keyframes gentle-float {
            0%, 100% { 
                transform: translateY(0) scale(1); 
            }
            50% { 
                transform: translateY(-3px) scale(1.02); 
            }
        }

        @keyframes elegant-glow {
            0%, 100% { 
                color: #ffd700;
                text-shadow: 
                    0 0 20px rgba(255, 215, 0, 0.8),
                    0 0 40px rgba(212, 175, 55, 0.6),
                    2px 2px 4px rgba(139, 69, 19, 0.8),
                    0 0 60px rgba(255, 215, 0, 0.4);
                filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.7));
            }
            50% { 
                color: #ffec8b;
                text-shadow: 
                    0 0 30px rgba(255, 215, 0, 1),
                    0 0 60px rgba(212, 175, 55, 0.8),
                    3px 3px 6px rgba(139, 69, 19, 0.9),
                    0 0 90px rgba(255, 215, 0, 0.6);
                filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9));
            }
        }

        /* Ancient Subtitle */
        .subtitle {
            font-size: 1.8rem;
            text-align: center;
            opacity: 0.9;
            margin-bottom: 3rem;
            font-style: italic;
            color: #f4e4bc;
            animation: fade-in-ancient 3s ease-out 1s both;
            letter-spacing: 0.1em;
        }

        @keyframes fade-in-ancient {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.9); 
            }
            to { 
                opacity: 0.9; 
                transform: translateY(0) scale(1); 
            }
        }

        /* Ancient Action Buttons */
        .actions {
            display: flex;
            gap: 3rem;
            animation: fade-in-ancient 3s ease-out 2s both;
        }

        .btn {
            padding: 18px 35px;
            border: 2px solid #d4af37;
            border-radius: 25px;
            background: linear-gradient(45deg, rgba(212, 175, 55, 0.1), rgba(139, 69, 19, 0.1));
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.15em;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            box-shadow: 
                inset 0 0 20px rgba(212, 175, 55, 0.1),
                0 0 20px rgba(212, 175, 55, 0.3);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            transition: left 0.6s ease;
            border-radius: 25px;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                inset 0 0 30px rgba(212, 175, 55, 0.2),
                0 15px 40px rgba(212, 175, 55, 0.4);
            border-color: #f4e4bc;
            color: #f4e4bc;
        }

        /* Mystical Particles */
        .mystical-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #d4af37, transparent);
            border-radius: 50%;
            animation: mystical-float 8s ease-in-out infinite;
        }

        @keyframes mystical-float {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1) rotate(0deg); 
                opacity: 0.6; 
            }
            33% { 
                transform: translateY(-100px) translateX(-40px) scale(1.3) rotate(120deg); 
                opacity: 1; 
            }
            66% { 
                transform: translateY(-60px) translateX(40px) scale(0.8) rotate(240deg); 
                opacity: 0.8; 
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 3rem;
            }
            
            .actions {
                flex-direction: column;
                gap: 1.5rem;
            }
            
            .mystical-aura {
                width: 400px;
                height: 400px;
            }
        }

        /* Loading Animation */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0c0a08, #1a1511);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: ancient-fade-out 3s ease-out 4s both;
        }

        .loading-symbol {
            font-size: 4rem;
            color: #d4af37;
            animation: loading-spiral 3s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        .loading-text {
            font-size: 1.5rem;
            color: #f4e4bc;
            animation: loading-pulse 1.5s ease-in-out infinite;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.2em;
        }

        @keyframes loading-spiral {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes loading-pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes ancient-fade-out {
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading">
        <div class="loading-symbol">🌀</div>
        <div class="loading-text">AWAKENING ANCIENT WISDOM...</div>
    </div>

    <!-- Forest Background -->
    <div class="forest-bg"></div>

    <!-- Sacred Patterns -->
    <div class="sacred-patterns">
        <!-- AZIJSKA STRAN - Bambus in Buda -->
        <div class="asian-section">
            <!-- Bambus na levi -->
            <div class="bamboo-grove">
                <svg viewBox="0 0 150 500" width="150" height="500" style="position: absolute; left: 0; top: 10%;">
                    <!-- Bamboo stalks -->
                    <rect class="bamboo-stalk" x="20" y="0" width="8" height="500" fill="rgba(34, 89, 34, 0.7)"/>
                    <rect class="bamboo-stalk" x="45" y="50" width="10" height="450" fill="rgba(34, 89, 34, 0.8)"/>
                    <rect class="bamboo-stalk" x="70" y="20" width="7" height="480" fill="rgba(34, 89, 34, 0.6)"/>
                    <rect class="bamboo-stalk" x="95" y="80" width="9" height="420" fill="rgba(34, 89, 34, 0.75)"/>
                    <rect class="bamboo-stalk" x="120" y="30" width="6" height="470" fill="rgba(34, 89, 34, 0.65)"/>
                    
                    <!-- Bamboo nodes -->
                    <ellipse cx="24" cy="100" rx="6" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    <ellipse cx="24" cy="200" rx="6" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    <ellipse cx="24" cy="300" rx="6" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    <ellipse cx="24" cy="400" rx="6" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    
                    <ellipse cx="50" cy="150" rx="7" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    <ellipse cx="50" cy="250" rx="7" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    <ellipse cx="50" cy="350" rx="7" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    <ellipse cx="50" cy="450" rx="7" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    
                    <ellipse cx="74" cy="120" rx="5" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    <ellipse cx="74" cy="220" rx="5" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    <ellipse cx="74" cy="320" rx="5" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    <ellipse cx="74" cy="420" rx="5" ry="3" fill="rgba(139, 69, 19, 0.8)"/>
                    
                    <!-- Bamboo leaves -->
                    <ellipse cx="35" cy="90" rx="20" ry="4" fill="rgba(34, 89, 34, 0.6)" transform="rotate(45 35 90)"/>
                    <ellipse cx="60" cy="140" rx="25" ry="5" fill="rgba(34, 89, 34, 0.5)" transform="rotate(-30 60 140)"/>
                    <ellipse cx="85" cy="110" rx="18" ry="4" fill="rgba(34, 89, 34, 0.6)" transform="rotate(60 85 110)"/>
                    <ellipse cx="110" cy="180" rx="22" ry="5" fill="rgba(34, 89, 34, 0.5)" transform="rotate(-45 110 180)"/>
                </svg>
            </div>
            
            <!-- Buda silhueta -->
            <div class="buddha-silhouette" style="position: absolute; left: 12%; top: 35%; width: 120px; height: 160px;">
                <svg viewBox="0 0 120 160" width="120" height="160">
                    <!-- Buddha meditation pose -->

    <script>
        // Initialize title letter animation
        document.addEventListener('DOMContentLoaded', function() {
            const title = document.getElementById('mainTitle');
            const text = title.textContent;
            title.innerHTML = '';
            
            for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.textContent = text[i];
                span.className = 'title-letter';
                title.appendChild(span);
            }

            // Create additional floating particles
            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'mystical-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = '100vh';
                particle.style.animationDelay = Math.random() * 8 + 's';
                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 8000);
            }

            // Generate particles periodically
            setInterval(createParticle, 3000);
        });
    </script>
