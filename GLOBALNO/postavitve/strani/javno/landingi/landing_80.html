<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraMentalica - Multiverse Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
body {
    font-family: 'Cinzel', serif;
    background: radial-gradient(circle at 50% 50%, #000 0%, #0a0014 30%, #1a0032 70%, #000 100%);
    color: #e6d6b3;
    min-height: 100vh;
    overflow: hidden;
    cursor: none;
    position: relative;
}
@media (pointer: coarse) {
    body { cursor: auto; }
}
img {
    -webkit-user-drag: none;
    user-drag: none;
}
.void-background {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(40,10,60,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(60,20,40,0.2) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(30,40,60,0.25) 0%, transparent 50%);
    z-index:-3;
}
.primordial-grid {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background-image:
        linear-gradient(rgba(80,20,120,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,20,120,0.15) 1px, transparent 1px);
    background-size:40px 40px;
    animation:gridPulse 30s linear infinite;
    z-index:-2;
}
.portal-core {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center; z-index:10; width:90%; max-width:600px;
}
.ancient-title {
    font-size:3.5rem; font-weight:400; color:#d4af37;
    text-shadow:0 0 10px rgba(212,175,55,0.5),0 0 20px rgba(139,69,19,0.3);
    letter-spacing:6px; margin-bottom:1rem; text-transform:uppercase;
}
.akashic-subtitle {
    font-size:1.1rem; color:rgba(180,160,120,0.8);
    letter-spacing:8px; margin-bottom:3rem; font-weight:300; text-transform:uppercase;
}
.primordial-loader {
    position:relative; width:300px; height:4px;
    background:rgba(60,40,80,0.3); margin:4rem auto 2rem auto;
    border-radius:2px; overflow:hidden;
}
.loader-progress {
    position:absolute; top:0; left:0; height:100%; width:0%;
    background:linear-gradient(90deg,#8b4513,#d4af37,#8b4513);
    animation:loadingProgress 8s ease-in-out infinite;
    box-shadow:0 0 10px rgba(212,175,55,0.5);
}
.loading-dots {
    display:flex; justify-content:center; gap:8px; margin:1rem 0 3rem 0;
}
.loading-dot {
    width:6px; height:6px; background:#8b4513; border-radius:50%;
    animation:dotPulse 1.5s ease-in-out infinite;
}
.loading-dot:nth-child(2){animation-delay:0.2s;}
.loading-dot:nth-child(3){animation-delay:0.4s;}
.loading-dot:nth-child(4){animation-delay:0.6s;}
.loading-dot:nth-child(5){animation-delay:0.8s;}
.ancient-symbols {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:5;
}
.symbol-node {
    position:absolute; font-size:1.4rem; color:rgba(139,69,19,0.7);
    opacity:0; animation:symbolDrift 20s linear infinite;
    text-shadow:0 0 5px rgba(139,69,19,0.3);
    will-change:transform,opacity;
}
.gateway-access { margin-top:3rem; }
.stone-gate {
    display:inline-block; padding:1rem 2.5rem; font-size:1rem; color:#d4af37;
    background:rgba(40,20,60,0.3);
    border:1px solid rgba(139,69,19,0.5); border-radius:2px;
    text-decoration:none; text-transform:uppercase;
    letter-spacing:3px; font-weight:400; transition:all 0.3s ease;
    cursor:none; backdrop-filter:blur(5px); position:relative; overflow:hidden;
}
.stone-gate::before {
    content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(212,175,55,0.1),transparent);
    transition:left 0.6s;
}
.stone-gate:hover::before { left:100%; }
.stone-gate:hover {
    border-color:#d4af37;
    box-shadow:0 0 20px rgba(212,175,55,0.3), inset 0 0 20px rgba(212,175,55,0.1);
}
.gateway-status {
    margin-top:2rem; font-size:0.9rem;
    color:rgba(180,160,120,0.7); letter-spacing:2px;
    font-family:monospace; text-transform:uppercase;
    transition:color 0.3s ease;
}
.rune-cursor {
    position:fixed; width:16px; height:16px; pointer-events:none; z-index:10000;
}
.cursor-center {
    width:2px; height:2px; background:#d4af37;
    border-radius:50%; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
}
.cursor-cross {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:16px; height:16px;
}
.cursor-cross::before,
.cursor-cross::after {
    content:''; position:absolute; background:rgba(139,69,19,0.8);
}
.cursor-cross::before {
    width:100%; height:1px; top:50%; transform:translateY(-50%);
}
.cursor-cross::after {
    width:1px; height:100%; left:50%; transform:translateX(-50%);
}
@keyframes gridPulse {
    0%,100%{opacity:0.3;}50%{opacity:0.6;}
}
@keyframes loadingProgress {
    0%{width:0%;}50%{width:85%;}100%{width:100%;}
}
@keyframes dotPulse {
    0%,100%{transform:scale(1);background:#8b4513;}
    50%{transform:scale(1.3);background:#d4af37;}
}
@keyframes symbolDrift {
    0%{opacity:0;transform:translate(0,0) rotate(0deg);}
    10%,90%{opacity:0.8;}
    100%{opacity:0;transform:translate(100px,-50px) rotate(180deg);}
}
@media (max-width:768px){
    .ancient-title{font-size:2.5rem;letter-spacing:4px;}
    .akashic-subtitle{font-size:0.9rem;letter-spacing:6px;}
    .primordial-loader{width:250px;}
    .stone-gate{padding:0.8rem 2rem;font-size:0.9rem;}
}
.protected {
    -webkit-touch-callout:none; -webkit-user-select:none;
    -moz-user-select:none; -ms-user-select:none; user-select:none;
}
</style>
</head>
<body class="protected">
<div class="void-background"></div>
<div class="primordial-grid"></div>
<div class="ancient-symbols" id="ancientSymbols"></div>

<div class="portal-core">
    <h1 class="ancient-title">ASTRAMENTALICA</h1>
    <p class="akashic-subtitle">TRANSCENDENTALNA KONVERGENCA</p>
    <div class="primordial-loader"><div class="loader-progress"></div></div>
    <div class="loading-dots">
        <div class="loading-dot"></div><div class="loading-dot"></div>
        <div class="loading-dot"></div><div class="loading-dot"></div>
        <div class="loading-dot"></div>
    </div>
    <div class="gateway-status" id="gatewayStatus">Inicializacija portalnega jedra...</div>
    <div class="gateway-access">
        <a href="#" class="stone-gate" id="stoneGate" aria-label="Vstop v portal">PRISTOPI</a>
    </div>
</div>

<div class="rune-cursor"><div class="cursor-center"></div><div class="cursor-cross"></div></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    document.addEventListener('contextmenu', e => e.preventDefault());
    const cursor = document.querySelector('.rune-cursor');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    const ancientSymbols = document.getElementById('ancientSymbols');
    const gatewayStatus = document.getElementById('gatewayStatus');
    const ancientRunes = ["ᛟ","ᛉ","ᚦ","ᛝ","ᛞ","ᚨ","ᛏ","ᛒ","ᚷ","ᚹ",
                          "⌬","⎊","⚶","⍟","⏣","⌾","⍣","⍥","⍦","⍾",
                          "𓂀","𓆓","𓋹","𓁩","𓏅","𓍶","𓎟","𓂧","𓋴","𓆼"];
    const statusMessages = [
        "Inicializacija portalnega jedra...",
        "Vzpostavljanje akaške povezave...",
        "Sinhronizacija z vesoljskim poljem...",
        "Kalibracija energijskih tokov...",
        "Odpiram multidimenzionalne prehode...",
        "Portal pripravljen za dostop...",
        "Stabilizacija kvantnega polja...",
        "Povezava z višjo zavestjo..."
    ];
    function createSymbols() {
        for (let i = 0; i < 25; i++) {
            const s = document.createElement('div');
            s.className = 'symbol-node';
            s.textContent = ancientRunes[Math.floor(Math.random() * ancientRunes.length)];
            s.style.left = Math.random() * 85 + 5 + '%';
            s.style.top = Math.random() * 85 + 5 + '%';
            s.style.animationDelay = Math.random() * 20 + 's';
            s.style.animationDuration = 15 + Math.random() * 15 + 's';
            ancientSymbols.appendChild(s);
        }
    }
    let idx = 0;
    function updateStatus() {
        gatewayStatus.textContent = statusMessages[idx];
        idx = (idx + 1) % statusMessages.length;
    }

    const stoneGate = document.getElementById('stoneGate');
    stoneGate.addEventListener('mouseenter',()=>cursor.style.transform='scale(1.5)');
    stoneGate.addEventListener('mouseleave',()=>cursor.style.transform='scale(1)');
    stoneGate.addEventListener('click',e=>{
        e.preventDefault();
        stoneGate.textContent = "⟳ AKTIVIRAM PORTAL...";
        stoneGate.style.background = 'rgba(60,40,20,0.5)';
        gatewayStatus.textContent = "Energijsko polje v stabilizaciji...";
        gatewayStatus.style.color = '#d4af37';
        setTimeout(()=>{
            stoneGate.textContent = "✓ DOSTOP ODOBREN";
            gatewayStatus.textContent = "Portal odprt - preusmerjam...";
            setTimeout(()=>window.location.href="GLOBALNO/index.php",5000);
        },5000);
    });

    createSymbols();
    updateStatus();
    setInterval(updateStatus,3500);
});
</script>
</body>
</html>
