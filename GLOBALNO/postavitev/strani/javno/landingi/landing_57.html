<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraMentalica - Ancient Wisdom</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Almendra:wght@400;700&display=swap');

/* --- Osnovni stil --- */
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0c0a08; color:#d4af37; font-family:'Cinzel',serif; overflow-x:hidden; position:relative; }

/* --- Forest Background --- */
.forest-bg {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: radial-gradient(circle at 20% 30%, rgba(139,69,19,0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(34,56,42,0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(61,43,31,0.1) 0%, transparent 60%),
                linear-gradient(135deg, rgba(12,10,8,0.9) 0%, rgba(25,20,15,0.8) 100%);
    z-index:-3;
}

/* --- Sacred Patterns --- */
.sacred-patterns { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-2; opacity:0.12; }

/* Celtic Triple Spiral */
.triple-spiral { position:absolute; width:180px; height:180px; top:15%; left:8%; animation:sacred-rotate 40s linear infinite; }
.spiral-arm { stroke:#d4af37; stroke-width:2.5; fill:none; stroke-linecap:round; animation:spiral-glow 5s ease-in-out infinite; }

@keyframes spiral-glow { 0%,100%{stroke:#d4af37;stroke-width:2.5;opacity:0.8;} 50%{stroke:#f4e4bc;stroke-width:3.5;opacity:1;} }
@keyframes sacred-rotate { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

/* Fibonacci Spiral */
.fibonacci-spiral { position:absolute; width:220px; height:220px; top:60%; right:10%; animation:sacred-rotate 60s linear infinite reverse; }
.fib-curve { stroke:#8b4513; stroke-width:3; fill:none; animation:fib-breathe 7s ease-in-out infinite; }
@keyframes fib-breathe { 0%,100%{stroke-opacity:0.6;transform:scale(1);} 50%{stroke-opacity:1;transform:scale(1.08);} }

/* Flowing Vine Pattern */
.vine-pattern { position:absolute; width:300px; height:400px; top:20%; right:25%; }
.vine-stem { stroke:rgba(34,89,56,0.7); stroke-width:4; fill:none; stroke-linecap:round; animation:vine-sway 8s ease-in-out infinite; }
.vine-leaf { fill:rgba(139,69,19,0.5); animation:leaf-flutter 6s ease-in-out infinite; }
@keyframes vine-sway {0%,100%{transform:rotate(-2deg) scale(1);}50%{transform:rotate(2deg) scale(1.03);}}
@keyframes leaf-flutter {0%,100%{transform:scale(1) rotate(0deg); opacity:0.5;}50%{transform:scale(1.1) rotate(5deg); opacity:0.8;}}

/* Sacred Mandala */
.mandala { position:absolute; width:200px; height:200px; bottom:15%; left:15%; }
.mandala-layer { stroke:none; fill:rgba(212,175,55,0.15); animation:mandala-pulse 12s ease-in-out infinite; }
.mandala-outline { stroke:rgba(139,69,19,0.6); stroke-width:1.5; fill:none; animation:mandala-rotate 30s linear infinite; }
@keyframes mandala-pulse {0%,100%{opacity:0.15;transform:scale(1);}50%{opacity:0.4;transform:scale(1.05);}}
@keyframes mandala-rotate {from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* Celtic Infinity Knot */
.infinity-knot { position:absolute; width:160px; height:100px; top:45%; left:5%; }
.knot-flow { stroke:#d4af37; stroke-width:3; fill:none; stroke-linecap:round; animation:flow-energy 6s ease-in-out infinite; }
@keyframes flow-energy {0%,100%{stroke-dasharray:0 300;}50%{stroke-dasharray:150 150;}}

/* Water Flow Pattern */
.water-flow { position:absolute; width:250px; height:180px; bottom:35%; right:30%; }
.water-wave { stroke:rgba(70,130,180,0.4); stroke-width:2.5; fill:none; animation:wave-flow 4s ease-in-out infinite; }
@keyframes wave-flow {0%,100%{stroke-dasharray:0 200;opacity:0.4;}50%{stroke-dasharray:100 100;opacity:0.8;}}

/* Tree of Life */
.organic-tree { position:absolute; width:180px; height:280px; top:10%; right:5%; }
.tree-branch { stroke:rgba(139,69,19,0.7); stroke-width:2.5; fill:none; stroke-linecap:round; animation:branch-growth 10s ease-in-out infinite; }
.tree-circle { fill:rgba(212,175,55,0.3); stroke:rgba(212,175,55,0.8); stroke-width:1.5; animation:circle-glow 8s ease-in-out infinite; }
@keyframes branch-growth {0%,100%{opacity:0.7;transform:scale(1);}50%{opacity:1;transform:scale(1.02);}}
@keyframes circle-glow {0%,100%{fill-opacity:0.3;stroke-opacity:0.8;}50%{fill-opacity:0.6;stroke-opacity:1;}}

/* Energy Streams */
.energy-stream { position:absolute; animation:energy-flow 15s linear infinite; }
.stream-particle { width:4px; height:4px; background:radial-gradient(circle,#d4af37,transparent); border-radius:50%; position:absolute; animation:particle-float 8s ease-in-out infinite; }
@keyframes energy-flow { from{transform:translateY(100vh) rotate(0deg);} to{transform:translateY(-100px) rotate(360deg);} }
@keyframes particle-float {0%,100%{transform:scale(0.8) translateX(0);opacity:0.6;}50%{transform:scale(1.2) translateX(20px);opacity:1;}}

/* --- Main Container --- */
.container { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; position:relative; text-align:center; }

/* Mystical Aura */
.mystical-aura { position:absolute; width:700px; height:700px; border-radius:50%; background:radial-gradient(circle, transparent 30%, rgba(212,175,55,0.05) 50%, transparent 70%); animation:aura-pulse 8s ease-in-out infinite; z-index:1;}
@keyframes aura-pulse {0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.12);opacity:1;}}

/* --- Title --- */
.title {
    font-size: clamp(4rem,9vw,8rem);
    font-weight:900;
    color:#ffd700;
    text-shadow:0 0 25px #ffd700,0 0 50px rgba(212,175,55,0.8),3px 3px 8px rgba(139,69,19,0.9),0 0 100px rgba(255,215,0,0.6);
    letter-spacing:0.15em;
    font-family:'Almendra',serif;
    position:relative;
    z-index:2;
}
.title-letter { display:inline-block; animation:gentle-float 6s ease-in-out infinite; transition:all 0.3s ease; }
.title-letter:nth-child(1){animation-delay:0.1s;} 
.title-letter:nth-child(2){animation-delay:0.2s;} 
.title-letter:nth-child(3){animation-delay:0.3s;} 
.title-letter:nth-child(4){animation-delay:0.4s;} 
.title-letter:nth-child(5){animation-delay:0.5s;} 
.title-letter:nth-child(6){animation-delay:0.6s;} 
.title-letter:nth-child(7){animation-delay:0.7s;} 
.title-letter:nth-child(8){animation-delay:0.8s;} 
.title-letter:nth-child(9){animation-delay:0.9s;} 
.title-letter:nth-child(10){animation-delay:1s;} 
.title-letter:hover{transform:scale(1.15) translateY(-5px); text-shadow:0 0 30px rgba(255,215,0,0.9),0 0 60px rgba(212,175,55,0.7),3px 3px 6px rgba(139,69,19,0.8);}

@keyframes gentle-float {0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-3px) scale(1.02);}}

/* Subtitle */
.subtitle { font-size:1.8rem; text-align:center; opacity:0.9; margin-bottom:3rem; font-style:italic; color:#f4e4bc; animation:fade-in-ancient 3s ease-out 1s both; letter-spacing:0.1em; }
@keyframes fade-in-ancient { from{opacity:0; transform:translateY(30px) scale(0.9);} to{opacity:0.9; transform:translateY(0) scale(1);} }

/* --- Mystical Particles --- */
.mystical-particle { position:absolute; width:3px; height:3px; background:radial-gradient(circle,#d4af37,transparent); border-radius:50%; animation:mystical-float 8s ease-in-out infinite; }
@keyframes mystical-float {0%,100%{transform:translateY(0) translateX(0) scale(1) rotate(0deg);opacity:0.6;}33%{transform:translateY(-100px) translateX(-40px) scale(1.3) rotate(120deg);opacity:1;}66%{transform:translateY(-60px) translateX(40px) scale(0.8) rotate(240deg);opacity:0.8;}}

/* Responsive */
@media (max-width:768px){.title{font-size:3rem;} .container{padding:1rem;}}

</style>
</head>
<body>

<!-- Forest Background -->
<div class="forest-bg"></div>

<!-- Sacred Patterns -->
<div class="sacred-patterns">
    <!-- Celtic Triple Spiral -->
    <div class="triple-spiral">
        <svg viewBox="0 0 180 180" width="180" height="180">
            <path class="spiral-arm" d="M90 90 Q60 60, 45 90 Q60 120, 90 105 Q120 90, 105 60 Q90 30, 60 45 Q30 60, 45 90 Q60 120, 90 135 Q120 150, 150 135 Q135 120, 120 90 Q105 60, 90 75"/>
            <path class="spiral-arm" d="M90 90 Q120 60, 135 90 Q120 120, 90 105 Q60 90, 75 120 Q90 150, 120 135 Q150 120, 135 90 Q120 60, 90 45 Q60 30, 30 45 Q45 60, 60 90 Q75 120, 90 105" transform="rotate(120 90 90)"/>
            <path class="spiral-arm" d="M90 90 Q120 60, 135 90 Q120 120, 90 105 Q60 90, 75 120 Q90 150, 120 135 Q150 120, 135 90 Q120 60, 90 45 Q60 30, 30 45 Q45 60, 60 90 Q75 120, 90 105" transform="rotate(240 90 90)"/>
        </svg>
    </div>

    <!-- Fibonacci Spiral -->
    <div class="fibonacci-spiral">
        <svg viewBox="0 0 220 220" width="220" height="220">
            <path class="fib-curve" d="M110 110 Q89 89, 89 110 Q89 131, 110 131 Q131 131, 131 110 Q131 75, 110 75 Q75 75, 75 110 Q75 145, 110 145 Q145 145, 145 110 Q145 55, 110 55 Q55 55, 55 110 Q55 165, 110 165"/>
        </svg>
    </div>

    <!-- Mandala, Vine, Tree, Infinity Knot, Water Flow … ostanejo kot prej -->
</div>

<!-- Main Container -->
<div class="container">
    <div class="mystical-aura"></div>
    <h1 class="title" id="mainTitle">AstraMentalica</h1>
    <p class="subtitle">Wisdom of the Ancient Paths</p>
</div>

<!-- Mystical Particles -->
<div class="mystical-particle" style="top:20%; left:10%; animation-delay:0s;"></div>
<div class="mystical-particle" style="top:50%; left:70%; animation-delay:2s;"></div>
<div class="mystical-particle" style="top:70%; left:30%; animation-delay:4s;"></div>
<div class="mystical-particle" style="top:40%; left:50%; animation-delay:6s;"></div>
<div class="mystical-particle" style="top:60%; left:80%; animation-delay:1s;"></div>

<script>
// Razbijanje naslova na posamezne črke za animacijo
const titleEl = document.getElementById('mainTitle');
titleEl.innerHTML = titleEl.textContent.split('').map(l => `<span class="title-letter">${l}</span>`).join('');
</script>

</body>
</html>
