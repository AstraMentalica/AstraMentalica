<script nonce="<?= $cspNonce ?>">
(function() {
    // Avatar
    const avatarContainer = document.getElementById('avatarContainer');
    if (avatarContainer && typeof MisticniAvatar !== 'undefined') {
        const ime = localStorage.getItem('uporabnik_ime') || 'Popotnik';
        MisticniAvatar.ustvariCanvas(ime, avatarContainer);
    }
    
    // Zvok v ozadju
    if (typeof ZvokOzadje !== 'undefined') {
        ZvokOzadje.init();
        document.getElementById('zvokGumb')?.addEventListener('click', () => {
            if (ZvokOzadje.jeVklopljen()) {
                ZvokOzadje.izklopi();
                document.getElementById('zvokGumb').textContent = '🔇';
            } else {
                ZvokOzadje.vklopi();
                document.getElementById('zvokGumb').textContent = '🔊';
            }
        });
    }
    
    // Zid modrosti – lebdeči verzi
    async function naloziSporocila() {
        try {
            const odgovor = await fetch('api.php?akcija=zid_modrosti_beri');
            const podatki = await odgovor.json();
            if (podatki.status === 'uspeh' && podatki.vsebina) {
                const container = document.getElementById('zidSporocila');
                container.innerHTML = '';
                podatki.vsebina.forEach(s => {
                    const el = document.createElement('div');
                    el.className = 'zid-sporocilo';
                    el.innerHTML = `
                        <div class="zid-sporocilo-besedilo">${escapeHtml(s.sporocilo)}</div>
                        <div class="zid-sporocilo-cas">${s.cas_formatiran}</div>
                    `;
                    container.appendChild(el);
                });
            }
        } catch(e) { console.error(e); }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Pokaži naključni verz
    const verzi = [
        'Zvezde so zemljevidi naše notranjosti.',
        'Mir je pot do modrosti.',
        'Ko spremeniš pogled, se spremeni svet.',
        'V tišini slišiš odgovore, ki jih iščeš.',
        'Razsvetljenje ni cilj, ampak pot.',
        'Vsak dan je novo rojstvo.',
        'Ljubezen je most med svetovi.',
        'Sanje so vrata v druge resničnosti.'
    ];
    
    function prikaziNakljucniVerz() {
        const verz = verzi[Math.floor(Math.random() * verzi.length)];
        const zid = document.getElementById('zidModrosti');
        const el = document.createElement('div');
        el.className = 'lebdeci-verz';
        el.textContent = verz;
        el.style.left = Math.random() * 80 + 10 + '%';
        el.style.animationDuration = 8 + Math.random() * 8 + 's';
        el.style.animationDelay = Math.random() * 5 + 's';
        zid.appendChild(el);
        setTimeout(() => el.remove(), 15000);
    }
    
    // Občasno prikaži verz
    setInterval(prikaziNakljucniVerz, 30000);
    prikaziNakljucniVerz();
    
    // Modal za zid
    const modalZid = document.getElementById('modalZid');
    const modalPapirus = document.getElementById('modalPapirus');
    
    document.getElementById('zidGumb')?.addEventListener('click', () => {
        naloziSporocila();
        modalZid.classList.add('odprt');
    });
    
    document.getElementById('zidZapri')?.addEventListener('click', () => {
        modalZid.classList.remove('odprt');
    });
    
    document.getElementById('zidPoslji')?.addEventListener('click', async () => {
        const sporocilo = document.getElementById('zidVnos').value.trim();
        if (sporocilo.length < 3) {
            alert('Sporočilo je prekratko.');
            return;
        }
        try {
            const odgovor = await fetch('api.php?akcija=zid_modrosti_dodaj', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sporocilo: sporocilo })
            });
            const podatki = await odgovor.json();
            if (podatki.status === 'uspeh') {
                document.getElementById('zidVnos').value = '';
                naloziSporocila();
                alert('Tvoja modrost je dodana na zid.');
            } else {
                alert(podatki.sporocilo || 'Napaka.');
            }
        } catch(e) { alert('Napaka pri povezavi.'); }
    });
    
    // Papirus modrosti
    const papirusVerzi = [
        { tekst: 'Vse, kar iščeš, je že v tebi.', avtor: 'Starodavna modrost' },
        { tekst: 'Zvezde vodijo tiste, ki poslušajo.', avtor: 'Astralni spisi' },
        { tekst: 'Ko se srce odpre, se odprejo vrata vesolja.', avtor: 'Eterični listi' },
        { tekst: 'Vsak konec je nov začetek.', avtor: 'Kozmična modrost' },
        { tekst: 'Ti si pisatelj svoje usode.', avtor: 'Zvezdni prah' }
    ];
    
    document.getElementById('papirusGumb')?.addEventListener('click', () => {
        const nakljucni = papirusVerzi[Math.floor(Math.random() * papirusVerzi.length)];
        document.getElementById('papirusVsebina').innerHTML = `✨ "${nakljucni.tekst}" ✨`;
        document.getElementById('papirusAvtor').innerHTML = `— ${nakljucni.avtor} —`;
        modalPapirus.classList.add('odprt');
    });
    
    document.getElementById('papirusZapri')?.addEventListener('click', () => {
        modalPapirus.classList.remove('odprt');
    });
    
    // Google prijava
    document.getElementById('googlePrijava')?.addEventListener('click', async () => {
        const gumb = document.getElementById('googlePrijava');
        gumb.disabled = true;
        gumb.textContent = '⏳ Povezovanje...';
        try {
            const odgovor = await fetch('api.php?akcija=google_prijava');
            const podatki = await odgovor.json();
            if (podatki.status === 'uspeh' && podatki.vsebina.url) {
                window.location.href = podatki.vsebina.url;
            } else {
                alert('Napaka pri Google prijavi.');
                gumb.disabled = false;
                gumb.innerHTML = '<span class="google-ikona">G</span> Prijava z Google';
            }
        } catch(e) {
            alert('Napaka pri povezavi.');
            gumb.disabled = false;
            gumb.innerHTML = '<span class="google-ikona">G</span> Prijava z Google';
        }
    });
    
    // Zapri modal ob kliku izven
    window.addEventListener('click', (e) => {
        if (e.target === modalZid) modalZid.classList.remove('odprt');
        if (e.target === modalPapirus) modalPapirus.classList.remove('odprt');
    });
})();
</script>
</body>
</html>
