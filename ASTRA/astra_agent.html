<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>🤖 ASTRA AVTO-AGENT v2</title>
    <style>
        body { background:#03050d; color:#40c080; font-family:monospace; padding:20px; margin:0; }
        h1 { color:#e8c84a; font-size:18px; }
        #log { background:#080d18; border:1px solid #1a2535; padding:15px; border-radius:8px; 
               max-height:65vh; overflow-y:auto; font-size:11px; line-height:1.6; white-space:pre-wrap; }
        .task { color:#ff9800; }
        .done { color:#40c080; }
        .error { color:#e06060; }
        .info { color:#6a80a0; }
        .controls { margin:15px 0; display:flex; gap:10px; flex-wrap:wrap; }
        button { padding:10px 20px; border:1px solid #e8c84a; background:transparent; 
                 color:#e8c84a; border-radius:5px; cursor:pointer; font-family:monospace; font-size:12px; }
        button:hover { background:rgba(232,200,74,.1); }
        button.red { border-color:#e06060; color:#e06060; }
        button.green { border-color:#40c080; color:#40c080; }
        input { padding:8px; background:#080d18; border:1px solid #1a2535; color:#c8d4e8; 
                border-radius:4px; font-family:monospace; width:250px; }
        .stats { display:flex; gap:20px; margin:10px 0; font-size:11px; flex-wrap:wrap; }
        .stat { background:#080d18; border:1px solid #1a2535; padding:8px 14px; border-radius:4px; }
        .stat-val { color:#e8c84a; font-size:18px; font-weight:bold; }
        select { padding:8px; background:#080d18; border:1px solid #1a2535; color:#c8d4e8; 
                 border-radius:4px; font-family:monospace; }
    </style>
</head>
<body>

<h1>🤖 ASTRA AVTO-AGENT v2</h1>

<div class="stats">
    <div class="stat"><div class="stat-val" id="taskCount">0</div>Opravljenih</div>
    <div class="stat"><div class="stat-val" id="errorCount">0</div>Napak</div>
    <div class="stat"><div class="stat-val" id="timeRunning">00:00</div>Čas</div>
    <div class="stat"><div class="stat-val" id="queueCount">0</div>V vrsti</div>
</div>

<div class="controls">
    <button class="green" onclick="startAgent()">▶ Zaženi</button>
    <button class="red" onclick="stopAgent()">⏹ Ustavi</button>
    <button onclick="clearLog()">🗑 Počisti</button>
    <select id="modelSelect" onchange="changeModel()">
        <option value="gemini-2.0-flash">Gemini 2.0 Flash ⚡</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash ⚡⚡</option>
    </select>
    <input id="taskInput" type="text" placeholder="Dodaj nalogo...">
    <button onclick="addCustomTask()">➕</button>
</div>

<div id="log">
<span class="info">[00:00:00] ✅ Avto-agent pripravljen.</span>
<span class="info">[00:00:00] 💡 Klikni ▶ Zaženi ali dodaj nalogo.</span>
</div>

<script>
// ⚙️ KONFIGURACIJA
const GEMINI_API_KEY = '___VSTAVI_GEMINI_API_KLJUC___'; // Ključ nastavi v POT_SEF/.env_api (GEMINI_API_KEY=...)
let currentModel = 'gemini-2.0-flash';

let running = false;
let taskCount = 0;
let errorCount = 0;
let startTime = null;
let timerInterval = null;
let taskQueue = [];
let lastResults = [];

// Privzete naloge
const DEFAULT_TASKS = [
    "Analiziraj PHP sistem in predlagaj 3 izboljšave za hitrost",
    "Napiši kratko PHP funkcijo za validacijo emaila",
    "Poišči 2 varnostni ranljivosti v tipični PHP aplikaciji",
    "Napiši SQL poizvedbo za iskanje duplikatov",
    "Predlagaj optimizacijo za .htaccess",
    "Napiši kratko JSON schema za uporabnika",
    "Kako bi implementiral rate limiting v PHP?",
    "Napiši primer PHP regex za čiščenje vnosa",
    "Predlagaj strukturo map za MVC PHP projekt",
    "Kako bi debugiral počasno PHP stran?"
];

function log(msg, type = 'info') {
    const el = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    el.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
    el.scrollTop = el.scrollHeight;
}

function updateStats() {
    document.getElementById('taskCount').textContent = taskCount;
    document.getElementById('errorCount').textContent = errorCount;
    document.getElementById('queueCount').textContent = taskQueue.length;
    if (startTime) {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        const m = Math.floor(diff / 60).toString().padStart(2,'0');
        const s = (diff % 60).toString().padStart(2,'0');
        document.getElementById('timeRunning').textContent = `${m}:${s}`;
    }
}

function changeModel() {
    currentModel = document.getElementById('modelSelect').value;
    log(`🔄 Model spremenjen na: ${currentModel}`, 'info');
}

async function callGemini(prompt) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${GEMINI_API_KEY}`;
    
    const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            contents: [
                { role: "user", parts: [{ text: "Si avtomatski agent ASTRA za PHP razvoj. Odgovarjaj KRATKO (max 3 stavke) in DIREKTNO v slovenščini. Samo dejstva, brez vljudnostnih fraz." }] },
                { role: "model", parts: [{ text: "Razumem. Kratki odgovori, samo dejstva." }] },
                { role: "user", parts: [{ text: prompt }] }
            ],
            generationConfig: { temperature: 0.7, maxOutputTokens: 500 }
        })
    });
    
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.candidates[0].content.parts[0].text;
}

async function executeTask(task) {
    log(`📋 ${task}`, 'task');
    
    try {
        const result = await callGemini(task);
        const shortResult = result.substring(0, 250);
        log(`✅ ${shortResult}${result.length>250?'...':''}`, 'done');
        
        // Shrani za kontekst
        lastResults.push({ task, result: shortResult });
        if (lastResults.length > 3) lastResults.shift();
        
        taskCount++;
        updateStats();
        return result;
    } catch (error) {
        log(`❌ ${error.message}`, 'error');
        errorCount++;
        updateStats();
        return null;
    }
}

function getNextTask() {
    if (taskQueue.length > 0) {
        return taskQueue.shift();
    }
    
    // Uporabi kontekst prejšnjih nalog za boljšo naslednjo
    if (lastResults.length > 0 && Math.random() > 0.5) {
        const lastTask = lastResults[lastResults.length - 1].task;
        return `Glede na prejšnjo temo "${lastTask.substring(0, 50)}...", predlagaj naslednji korak ali izboljšavo.`;
    }
    
    const randomTask = DEFAULT_TASKS[Math.floor(Math.random() * DEFAULT_TASKS.length)];
    return randomTask;
}

async function agentLoop() {
    if (!running) return;
    
    const task = getNextTask();
    await executeTask(task);
    
    if (running) {
        const delay = 8000 + Math.random() * 4000; // 8-12s
        log(`⏳ Naslednja čez ${Math.floor(delay/1000)}s...`, 'info');
        setTimeout(() => agentLoop(), delay);
    }
}

function startAgent() {
    if (running) return;
    running = true;
    startTime = Date.now();
    taskCount = 0;
    errorCount = 0;
    lastResults = [];
    
    log('🚀 AGENT ZAGNAN! Delam...', 'done');
    
    agentLoop();
    timerInterval = setInterval(updateStats, 1000);
    updateStats();
}

function stopAgent() {
    running = false;
    clearInterval(timerInterval);
    log('⏹ Agent ustavljen.', 'info');
    updateStats();
}

function clearLog() {
    document.getElementById('log').innerHTML = '';
    log('✅ Log počiščen.', 'info');
}

function addCustomTask() {
    const input = document.getElementById('taskInput');
    const task = input.value.trim();
    if (!task) return;
    
    taskQueue.push(task);
    log(`➕ Dodano v vrsto: "${task}" (${taskQueue.length} v vrsti)`, 'task');
    input.value = '';
    
    if (!running) startAgent();
}

document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCustomTask();
});
</script>
</body>
</html>
