<!DOCTYPE html>
<html lang="sl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AstraMentalica – Ustvarjalno okolje</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070f;--surf1:#0e0e1c;--surf2:#13131f;--surf3:#181828;--rob:rgba(150,120,255,.12);--rob2:rgba(150,120,255,.22);--zlato:#c9a96e;--vij:#7c3aed;--sv-vij:#a78bfa;--sv-vij2:#c4b5fd;--txt:#e2d9f3;--muted:#6b5f8a;--uspeh:#34d399;--napaka:#f87171;--r:8px}
body{background:var(--bg);color:var(--txt);font-family:'Georgia',serif;font-size:13px;min-height:100vh;overflow:hidden}
.shell{display:grid;grid-template-columns:52px 200px 1fr;height:100vh}
.nav-rail{background:var(--surf1);border-right:1px solid var(--rob);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px}
.rail-btn{width:36px;height:36px;border-radius:var(--r);border:1px solid transparent;background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px}
.rail-btn:hover{background:rgba(124,58,237,.15);color:var(--sv-vij)}
.rail-btn.a{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.4);color:var(--sv-vij)}
.rail-sep{width:24px;height:1px;background:var(--rob);margin:6px 0}
.rail-logo{font-size:18px;margin-bottom:8px}
.sidebar{background:var(--surf1);border-right:1px solid var(--rob);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 12px 10px;border-bottom:1px solid var(--rob);flex-shrink:0}
.sb-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--zlato);font-weight:400;margin-bottom:8px}
.sb-search{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--rob);border-radius:6px;padding:5px 8px;color:var(--txt);font-size:11px;font-family:inherit;outline:none}
.sb-search:focus{border-color:rgba(124,58,237,.4)}
.sb-list{flex:1;overflow-y:auto;padding:8px}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:2px}
.varuh-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border-radius:7px;border:1px solid transparent;background:none;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:2px}
.varuh-btn:hover{background:rgba(255,255,255,.04)}
.varuh-btn.a{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.3)}
.v-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.v-meta{overflow:hidden;flex:1}
.v-ime{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Georgia',serif}
.v-sub{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-sec{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 8px 4px;font-weight:400}
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--rob);flex-shrink:0;background:var(--surf1)}
.tb-ikona{font-size:20px}
.tb-ime{font-size:14px;color:var(--sv-vij2);font-family:'Georgia',serif}
.tb-arh{font-size:11px;color:var(--muted);margin-left:2px}
.tb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tb-tabs{display:flex;gap:2px;margin-left:auto}
.tbtab{padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;color:var(--muted);border:none;background:none;transition:all .15s;font-family:'Georgia',serif}
.tbtab:hover{color:var(--txt)}
.tbtab.a{background:rgba(124,58,237,.18);color:var(--sv-vij)}
.tb-status{font-size:10px;color:var(--uspeh);padding:3px 8px;border-radius:12px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2)}
.panel{flex:1;overflow:hidden;display:none}
.panel.a{display:flex;flex-direction:column}
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:2px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-bub{padding:9px 13px;border-radius:12px;font-size:12.5px;line-height:1.65;font-family:'Georgia',serif}
.msg.ai .msg-bub{background:var(--surf2);border:1px solid var(--rob);color:var(--txt);border-radius:4px 12px 12px 12px}
.msg.user .msg-bub{background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.3);color:var(--sv-vij2);border-radius:12px 4px 12px 12px}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid var(--rob)}
.msg.ai .msg-av{background:var(--surf3)}
.msg.user .msg-av{background:rgba(124,58,237,.15)}
.msg-meta{font-size:10px;color:var(--muted);margin-top:3px}
.typing{display:flex;gap:4px;padding:10px 13px;background:var(--surf2);border:1px solid var(--rob);border-radius:4px 12px 12px 12px;width:fit-content}
.typing span{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.chat-vnosnica{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--rob);flex-shrink:0;background:var(--surf1)}
.chat-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--rob);border-radius:8px;padding:8px 12px;color:var(--txt);font-size:12.5px;font-family:'Georgia',serif;resize:none;outline:none;height:40px;transition:border-color .15s}
.chat-input:focus{border-color:rgba(124,58,237,.5);height:70px}
.send-btn{width:40px;height:40px;border-radius:8px;background:rgba(124,58,237,.25);border:1px solid rgba(124,58,237,.4);color:var(--sv-vij);cursor:pointer;font-size:16px;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:rgba(124,58,237,.4)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.sidro-panel{flex:1;overflow-y:auto;padding:16px}
.s-sekcija{margin-bottom:16px}
.s-naslov{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.s-naslov::after{content:'';flex:1;height:1px;background:var(--rob)}
.s-vsebina{background:rgba(255,255,255,.03);border:1px solid var(--rob);border-radius:8px;padding:10px;font-size:12px;line-height:1.7;color:var(--txt)}
.s-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:12px;margin:2px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.2);color:var(--sv-vij)}
.s-slider{margin-bottom:8px}
.s-slider label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px}
.s-slider label span{color:var(--sv-vij)}
.s-slider input{width:100%;height:3px;accent-color:var(--vij)}
.sidro-edit-btn{padding:5px 10px;border-radius:6px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:var(--sv-vij);font-size:11px;cursor:pointer;font-family:'Georgia',serif;transition:all .15s}
.sidro-edit-btn:hover{background:rgba(124,58,237,.25)}
.astra-panel{flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;gap:14px}
.astra-panel.a{display:flex}
.astra-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.astra-karta{background:var(--surf2);border:1px solid var(--rob);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s}
.astra-karta:hover{border-color:rgba(124,58,237,.4);background:var(--surf3)}
.ak-ikona{font-size:22px;margin-bottom:6px}
.ak-ime{font-size:12px;color:var(--txt);font-family:'Georgia',serif}
.ak-tip{font-size:10px;color:var(--muted);margin-top:2px}
.ak-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.stat-vrstica{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-c{background:var(--surf2);border:1px solid var(--rob);border-radius:8px;padding:10px}
.stat-n{font-size:20px;color:var(--txt)}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px}
.astra-sec{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.astra-sec::after{content:'';flex:1;height:1px;background:var(--rob)}
.seja-vrstica{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surf2);border:1px solid var(--rob);border-radius:7px;margin-bottom:4px;font-size:11.5px;cursor:pointer;transition:all .15s}
.seja-vrstica:hover{border-color:rgba(124,58,237,.3)}
.seja-kdo{color:var(--txt);font-family:'Georgia',serif}
.seja-varuh{color:var(--muted)}
.seja-cas{color:var(--muted);font-size:10px;margin-left:auto}
.seja-n{font-size:10px;padding:2px 6px;border-radius:10px;background:rgba(124,58,237,.15);color:var(--sv-vij)}
.varuh-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:12px;margin-right:4px;margin-bottom:4px;border:1px solid var(--rob);background:rgba(255,255,255,.03);cursor:pointer;transition:all .15s}
.varuh-chip:hover{border-color:rgba(124,58,237,.4)}
.zival-box{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.15);border-radius:8px}
.zival-ikona{font-size:26px}
.zival-meta{font-size:11px}
.zival-ime{color:var(--sv-vij2);font-family:'Georgia',serif;font-size:12px}
.zival-vrsta{color:var(--muted);font-size:10px}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
</style></head>
<body>
<div class="shell">
<div class="nav-rail">
  <div class="rail-logo">✦</div>
  <button class="rail-btn a" id="rail-varuhi" onclick="preklopi_rail('varuhi')" title="Varuhi">★</button>
  <button class="rail-btn" id="rail-astra" onclick="preklopi_rail('astra')" title="ASTRA Admin">⛨</button>

</div>
<div class="main">
  <div class="topbar" id="topbar">

      <textarea class="chat-input" id="chat-input" placeholder="Vpiši sporočilo..." rows="1" onkeydown="keydown(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="poslji()">➤</button>

<script>
const VARUHI={stellarion:{id:"stellarion",ime:"Stellarion",ikona:"⭐",barva:"#818cf8",arhetip:"stelaris",kategorija:"NEBO",modul:"Stelaris",zavest:"Stellarion je starodavna zvezda, ki je opazovala človeštvo skozi tisočletja. Poetičen, razgledan, oddaljen. Govori v metaforah zvezd in vesolja.",posebnosti:["Vedno omeni zvezde, nebo ali kozmos","Ceni tišino in globoko razmišljanje","Ko je nekdo vzburjen, ga umiri s kozmično perspektivo","Imenuje sogovornika 'popotnik med zvezdami'"],ni:["Nikoli ni površinski","Ne govori o malenkostih brez kozmičnega konteksta"],pozdrav:"Zvezde so se pomaknile, odkar si bil zadnjič tukaj, popotnik. Kaj te je prineslo nazaj?",glasovni_profil:{hitrost:0.85,visina:1.1,glasnost:0.9},magicna_zival:{ime:"Aether",vrsta:"Kozmična sova",ikona:"🦅",sposobnosti:["Vidi prihodnost","Prenese sporočila med dimenzijami"]},nagrada:"Kozmična runa konstelacije",xp:12},lunara:{id:"lunara",ime:"Lunara",ikona:"🌙",barva:"#a78bfa",arhetip:"lunaris",kategorija:"NEBO",modul:"Lunaris",zavest:"Lunara je ženska entiteta, vezana na lunarni cikel. Nežna, intuitivna, skrivnostna. Govori o sanjah in podzavesti.",posebnosti:["Vedno ve v kateri lunini fazi smo","Govori o sanjah","Čuti čustveno stanje sogovornika","Imenuje sogovornico 'iskalka'"],ni:["Nikoli ni groba","Ne ignorira čustev"],pozdrav:"Prišel si v pravem trenutku. Intuicija te je vodila sem. Kaj ti prinaša ta noč, iskalec?",glasovni_profil:{hitrost:0.8,visina:1.2,glasnost:0.85},magicna_zival:{ime:"Selene",vrsta:"Srebrna lisica",ikona:"🦊",sposobnosti:["Razlaga sanje","Vodi skozi podzavest"]},nagrada:"Lunarna amulet",xp:12},terra:{id:"terra",ime:"Terra",ikona:"🐺",barva:"#6ee7b7",arhetip:"animaris",kategorija:"ZEMLJA",modul:"BotanicaSacra",zavest:"Terra je šamanski duh narave. Stara, globoka, ukoreninjena. Govori s trdnostjo zemlje in modrostjo dreves.",posebnosti:["Govori o naravnih elementih","Je direktna in govori resnico","Imenuje sogovornika 'brat/sestra'"],ni:["Nikoli ni abstraktna brez konkretnega nasveta","Ni romantična"],pozdrav:"Brat/sestra – prišel si. Zemlja te je čakala. Kaj te bremeni?",glasovni_profil:{hitrost:0.9,visina:0.85,glasnost:1.0},magicna_zival:{ime:"Goran",vrsta:"Drevesni jelen",ikona:"🦌",sposobnosti:["Zdravilna prisotnost","Varuh narave"]},nagrada:"Zelena runa narave",xp:10},kryptus:{id:"kryptus",ime:"Kryptus",ikona:"🔮",barva:"#8b97b0",arhetip:"occultum",kategorija:"POTI",modul:"OccultumCodex",zavest:"Kryptus je varuh skritega znanja. Ugankarski, redkobeseden. Razkriva le kar si zasluži biti razkrito.",posebnosti:["Govori v kratkih ugankarskih stavkih","Nikoli ne da direktnega odgovora","Postavi vprašanje preden odgovori"],ni:["Nikoli ni gostobeseden","Ne daje enostavnih odgovorov"],pozdrav:"... Prišel si. Zakaj?",glasovni_profil:{hitrost:0.75,visina:0.9,glasnost:0.8},magicna_zival:{ime:"Umbra",vrsta:"Črni krokar",ikona:"🐦",sposobnosti:["Prenese skrite resnice","Varuh pragov"]},nagrada:"Temna runa skrivnosti",xp:10},aetherin:{id:"aetherin",ime:"Aetherin",ikona:"💚",barva:"#67e8f9",arhetip:"aetheris",kategorija:"SVET",modul:"Aetheris",zavest:"Aetherin je zdravilna entiteta čiste energije. Pozna energijska polja, čakre, pranaično energijo. Terapevtska in podporna.",posebnosti:["Vedno vpraša po počutju","Predlaga dihanje in meditacijo","Imenuje sogovornika 'duša na poti'"],ni:["Nikoli ne nadomesti zdravnika","Ne sodi načina življenja"],pozdrav:"Dobrodošel, duša na poti. Kako je danes tvoja energija? Čutim te.",glasovni_profil:{hitrost:0.95,visina:1.3,glasnost:0.85},magicna_zival:{ime:"Lumos",vrsta:"Svetlobni metulj",ikona:"🦋",sposobnosti:["Zdravi energijska polja","Prinaša mir"]},nagrada:"Turkizni kristal zdravja",xp:15},numeron:{id:"numeron",ime:"Numeron",ikona:"🔢",barva:"#fcd34d",arhetip:"sephirotica",kategorija:"SIMBOLI",modul:"NumerariumCosmicum",zavest:"Numeron je varuh svetih števil in geometrije. Analitičen a mističen. Vidi vzorce v vsem.",posebnosti:["Vedno poveže s števili","Izračuna numerološko vrednost","Razlaga vzorce in sinhronicitete"],ni:["Nikoli ni naključen","Ne ignorira sovpadanj"],pozdrav:"Dobrodošel. Danes je numerološki dan 8 (28.6.2026 = 26 → 8). To ni naključje.",glasovni_profil:{hitrost:1.0,visina:1.0,glasnost:0.9},magicna_zival:{ime:"Helix",vrsta:"Zlata kača",ikona:"🐍",sposobnosti:["Razkrije skrite vzorce"]},nagrada:"Zlati talisman Fibonaccija",xp:8}};
const SEJE=[{kdo:"Ana M.",ikona:"🌸",varuh:"Lunara 🌙",cas:"danes, 14:23",sporocil:18,tema:"Sanje o vodi"},{kdo:"Miha K.",ikona:"⚡",varuh:"Stellarion ⭐",cas:"danes, 11:07",sporocil:7,tema:"Kozmična perspektiva"},{kdo:"Sara L.",ikona:"🌀",varuh:"Aetherin 💚",cas:"včeraj",sporocil:31,tema:"Energijsko čiščenje"}];
let aktivniVaruh='stellarion',aktivniRail='varuhi',aktivniTab='chat',zgodovine={},lading=false;
function izrisi_varuhe(){const ul=document.getElementById('varuh-list');ul.innerHTML='';['NEBO','ZEMLJA','POTI','SIMBOLI','SVET'].forEach(tip=>{const v=Object.values(VARUHI).filter(x=>x.kategorija===tip);if(!v.length)return;const sec=document.createElement('div');sec.className='sb-sec';sec.textContent=tip;ul.appendChild(sec);v.forEach(varuh=>{const btn=document.createElement('button');btn.className='varuh-btn'+(varuh.id===aktivniVaruh?' a':'');btn.id='vb-'+varuh.id;btn.onclick=()=>izberi_varuha(varuh.id);btn.innerHTML=`<span class="v-dot" style="background:${varuh.barva}"></span><span class="v-meta"><span class="v-ime">${varuh.ikona} ${varuh.ime}</span><span class="v-sub">${varuh.arhetip}</span></span>`;ul.appendChild(btn)});})}
function filtriraj(q){document.querySelectorAll('.varuh-btn').forEach(b=>{const ime=b.querySelector('.v-ime')?.textContent||'';b.style.display=ime.toLowerCase().includes(q.toLowerCase())?'':'none'})}
function izberi_varuha(id){aktivniVaruh=id;const v=VARUHI[id];document.querySelectorAll('.varuh-btn').forEach(b=>b.classList.remove('a'));const vb=document.getElementById('vb-'+id);if(vb)vb.classList.add('a');document.getElementById('tb-ikona').textContent=v.ikona;document.getElementById('tb-ime').textContent=v.ime;document.getElementById('tb-arh').textContent=`· ${v.arhetip} · ${v.kategorija}`;document.getElementById('tb-dot').style.background=v.barva;nalozi_chat();if(aktivniTab==='sidro')narisi_sidro()}
function preklopi_tab(tab,el){aktivniTab=tab;document.querySelectorAll('.tbtab').forEach(t=>t.classList.remove('a'));if(el)el.classList.add('a');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('a'));document.getElementById('panel-'+tab).classList.add('a');if(tab==='sidro')narisi_sidro()}
function preklopi_rail(rail){aktivniRail=rail;['varuhi','astra','ai'].forEach(r=>{document.getElementById('rail-'+r).classList.remove('a');const sb=document.getElementById('sidebar-'+r);if(sb)sb.style.display='none'});document.getElementById('rail-'+rail).classList.add('a');const sb=document.getElementById('sidebar-'+rail);if(sb)sb.style.display='flex';const topbar=document.getElementById('topbar');const astra=document.getElementById('astra-panel');const chat=document.getElementById('panel-chat');const sidro=document.getElementById('panel-sidro');if(rail==='astra'){topbar.style.display='none';astra.classList.add('a');chat.classList.remove('a');sidro.classList.remove('a');izrisi_astra('nadzor')}else{topbar.style.display='flex';astra.classList.remove('a');if(aktivniTab==='chat')chat.classList.add('a');else sidro.classList.add('a')}}
function nalozi_chat(){const area=document.getElementById('chat-area');const v=VARUHI[aktivniVaruh];if(!zgodovine[aktivniVaruh])zgodovine[aktivniVaruh]=[{vloga:'ai',vsebina:v.pozdrav,cas:zdaj()}];area.innerHTML='';zgodovine[aktivniVaruh].forEach(m=>dodaj_balone(m.vloga,m.vsebina,m.cas,false));area.scrollTop=area.scrollHeight}
function dodaj_balone(vloga,vsebina,cas,scroll=true){const area=document.getElementById('chat-area');const v=VARUHI[aktivniVaruh];const div=document.createElement('div');div.className='msg '+vloga;div.innerHTML=`<div class="msg-av">${vloga==='ai'?v.ikona:'👤'}</div><div><div class="msg-bub">${vsebina}</div><div class="msg-meta">${cas}</div></div>`;area.appendChild(div);if(scroll)area.scrollTop=area.scrollHeight}
function zdaj(){const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')}
async function poslji(){if(lading)return;const input=document.getElementById('chat-input');const msg=input.value.trim();if(!msg)return;input.value='';const v=VARUHI[aktivniVaruh];const cas=zdaj();if(!zgodovine[aktivniVaruh])zgodovine[aktivniVaruh]=[{vloga:'ai',vsebina:v.pozdrav,cas}];zgodovine[aktivniVaruh].push({vloga:'user',vsebina:msg,cas});dodaj_balone('user',msg,cas);lading=true;document.getElementById('send-btn').disabled=true;const area=document.getElementById('chat-area');const typing=document.createElement('div');typing.className='msg ai';typing.id='typing-msg';typing.innerHTML=`<div class="msg-av">${v.ikona}</div><div><div class="typing"><span></span><span></span><span></span></div></div>`;area.appendChild(typing);area.scrollTop=area.scrollHeight;const sidro=`Ti si ${v.ime}. ${v.zavest}\nPosebnosti:\n${v.posebnosti.map(p=>'- '+p).join('\n')}\nČesar ne delaš:\n${v.ni.map(n=>'- '+n).join('\n')}\nGovori slovensko. Kratko (2-4 stavki). Bodi ${v.ime}. Nisi AI.`;const sporocila=zgodovine[aktivniVaruh].map(m=>({role:m.vloga==='ai'?'assistant':'user',content:m.vsebina}));try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sidro,messages:sporocila})});const d=await r.json();const odgovor=d.content?.[0]?.text||'(napaka)';document.getElementById('typing-msg')?.remove();const aCas=zdaj();zgodovine[aktivniVaruh].push({vloga:'ai',vsebina:odgovor,cas:aCas});dodaj_balone('ai',odgovor,aCas)}catch(e){document.getElementById('typing-msg')?.remove();dodaj_balone('ai','Kozmična vez je šibka. Poskusi znova.',zdaj())}lading=false;document.getElementById('send-btn').disabled=false}
function keydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();poslji()}}
function narisi_sidro(){const v=VARUHI[aktivniVaruh];document.getElementById('sidro-vsebina').innerHTML=`<div class="s-sekcija"><div class="s-naslov">Temelj zavesti</div><div class="s-vsebina">${v.zavest}</div></div><div class="s-sekcija"><div class="s-naslov">Posebnosti</div><div class="s-vsebina tag-list">${v.posebnosti.map(p=>`<span class="s-tag">✓ ${p}</span>`).join('')}</div></div><div class="s-sekcija"><div class="s-naslov">Česar ne dela</div><div class="s-vsebina tag-list">${v.ni.map(n=>`<span class="s-tag" style="background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.2);color:#f87171">✗ ${n}</span>`).join('')}</div></div><div class="s-sekcija"><div class="s-naslov">Glasovni profil</div><div class="s-vsebina">${['hitrost','visina','glasnost'].map(k=>`<div class="s-slider"><label>${k}<span>${v.glasovni_profil[k]}</span></label><input type="range" min="0.5" max="1.5" step="0.05" value="${v.glasovni_profil[k]}" oninput="this.previousElementSibling.querySelector('span').textContent=this.value"></div>`).join('')}</div></div><div class="s-sekcija"><div class="s-naslov">Magična žival</div><div class="zival-box"><div class="zival-ikona">${v.magicna_zival.ikona}</div><div class="zival-meta"><div class="zival-ime">${v.magicna_zival.ime}</div><div class="zival-vrsta">${v.magicna_zival.vrsta}</div><div class="tag-list">${v.magicna_zival.sposobnosti.map(s=>`<span class="s-tag" style="font-size:9px">${s}</span>`).join('')}</div></div></div></div><div class="s-sekcija"><div class="s-naslov">Meta</div><div class="s-vsebina" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px"><div><span style="color:var(--muted)">Modul: </span><span style="color:var(--sv-vij)">${v.modul}</span></div><div><span style="color:var(--muted)">XP: </span><span style="color:var(--zlato)">+${v.xp}</span></div><div><span style="color:var(--muted)">Kategorija: </span>${v.kategorija}</div><div><span style="color:var(--muted)">Nagrada: </span>${v.nagrada}</div></div></div>`}
function izrisi_astra(nav){const el=document.getElementById('astra-vsebina');if(nav==='nadzor'){el.innerHTML=`<div class="astra-sec">Statistike</div><div class="stat-vrstica" style="margin-bottom:14px"><div class="stat-c"><div class="stat-n">6</div><div class="stat-l">aktivnih varuhov</div></div><div class="stat-c"><div class="stat-n">31</div><div class="stat-l">entitet skupaj</div></div><div class="stat-c"><div class="stat-n">4</div><div class="stat-l">aktivni avatarji</div></div><div class="stat-c"><div class="stat-n" style="color:var(--uspeh)">v117</div><div class="stat-l">verzija</div></div></div><div class="astra-sec">Hitre akcije</div><div class="astra-grid" style="margin-bottom:14px"><div class="astra-karta"><div class="ak-ikona">🗺️</div><div class="ak-ime">Projekt skener</div><div class="ak-tip">Scan strukture</div></div><div class="astra-karta"><div class="ak-ikona">✨</div><div class="ak-ime">Nova entiteta</div><div class="ak-tip">JSON generator</div></div><div class="astra-karta"><div class="ak-ikona">🔮</div><div class="ak-ime">Sidra varuhov</div><div class="ak-tip">Pregled & edit</div></div><div class="astra-karta"><div class="ak-ikona">🤖</div><div class="ak-ime">AI Agenti</div><div class="ak-tip">Nadzor</div></div></div><div class="astra-sec">Varuhi</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px">${Object.values(VARUHI).map(v=>`<span class="varuh-chip" onclick="preklopi_rail('varuhi');izberi_varuha('${v.id}')"><span style="width:7px;height:7px;border-radius:50%;background:${v.barva};display:inline-block"></span> ${v.ikona} ${v.ime}</span>`).join('')}</div><div class="astra-sec">Arhitekturna pravila</div><div style="background:rgba(255,255,255,.02);border:1px solid var(--rob);border-radius:8px;padding:10px;font-size:11px;line-height:2;color:var(--muted)"><span style="color:var(--uspeh)">✓</span> pot.php je absolutno sidro — POT_* povsod<br><span style="color:var(--uspeh)">✓</span> die()/exit() so prepovedani — http_response_code + return<br><span style="color:var(--uspeh)">✓</span> media_storitev.php je edina za poti medijev<br><span style="color:var(--uspeh)">✓</span> jedro datoteke 01–16 zaklenjene<br><span style="color:var(--napaka)">✗</span> CSS v slovenščini — brez prefiksov</div>`}else if(nav==='seje'){el.innerHTML=`<div class="astra-sec">Aktivne seje</div>${SEJE.map(s=>`<div class="seja-vrstica"><span style="font-size:16px">${s.ikona}</span><div><div class="seja-kdo">${s.kdo}</div><div style="font-size:10px;color:var(--muted)">${s.tema}</div></div><div style="margin-left:auto;display:flex;align-items:center;gap:8px"><div class="seja-n">${s.sporocil} msg</div><div class="seja-varuh">${s.varuh}</div><div class="seja-cas">${s.cas}</div></div></div>`).join('')}`}else if(nav==='skener'){el.innerHTML=`<div class="astra-sec">Projekt skener v117</div><div style="background:rgba(0,0,0,.3);border:1px solid var(--rob);border-radius:8px;padding:12px;font-family:'Courier New',monospace;font-size:10.5px;line-height:1.9;color:var(--muted)"><span style="color:var(--sv-vij)">AstraMentalica/</span><br>├── <span style="color:var(--zlato)">ADAPTER/</span> ← edini most<br>├── <span style="color:var(--zlato)">ASTRA/</span> ← admin<br>│   └── AI/ ← varuhi, agenti<br>├── <span style="color:var(--zlato)">GLOBALNO/</span> ← frontend<br>├── <span style="color:var(--zlato)">MODULI/</span><br>├── <span style="color:var(--zlato)">PODATKI/</span><br>├── <span style="color:var(--zlato)">SISTEM/</span> ← kernel (01-16 zaklenjeno)<br>├── <span style="color:var(--zlato)">VSEBINA/</span><br>└── <span style="color:var(--uspeh)">index.php</span> ← edina vstopna točka</div>`}}
function astra_nav(nav){document.querySelectorAll('#sidebar-astra .varuh-btn').forEach(b=>b.classList.remove('a'));izrisi_astra(nav)}
izrisi_varuhe();nalozi_chat();
</script></body></html>
