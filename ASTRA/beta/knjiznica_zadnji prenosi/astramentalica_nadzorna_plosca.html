*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:var(--surface-0);color:var(--text-primary)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

.np-shell{display:grid;grid-template-rows:auto 1fr;min-height:600px}

.np-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:0.5px solid var(--border);background:var(--surface-1)}
.np-logo{font-size:20px}
.np-title{font-size:15px;font-weight:500;color:var(--text-primary)}
.np-sub{font-size:11px;color:var(--text-muted);margin-left:auto}
.np-tabs{display:flex;gap:2px;margin-left:1.5rem}
.nt{padding:6px 14px;border-radius:var(--radius);font-size:12px;cursor:pointer;color:var(--text-secondary);border:none;background:none;transition:all .15s}
.nt:hover{color:var(--text-primary)}
.nt.a{background:var(--surface-2);color:var(--text-primary);border:0.5px solid var(--border)}

.np-body{display:grid;grid-template-columns:200px 1fr;gap:0}
.np-nav{background:var(--surface-1);border-right:0.5px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nav-sect{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:8px 8px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text-secondary);transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface-2);color:var(--text-primary)}
.nav-item.a{background:var(--bg-pro);color:var(--text-pro);font-weight:500}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--surface-0);color:var(--text-muted);font-size:10px;padding:1px 6px;border-radius:10px}

.np-content{padding:20px;overflow-y:auto;max-height:580px}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-c{background:var(--surface-1);border-radius:var(--radius);padding:12px 14px}
.stat-n{font-size:22px;font-weight:500;color:var(--text-primary)}
.stat-l{font-size:11px;color:var(--text-muted);margin-top:2px}
.stat-d{font-size:10px;color:var(--text-success);margin-top:4px}

.sec-title{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-btn{font-size:11px;color:var(--text-accent);cursor:pointer;background:none;border:none;padding:2px 6px;border-radius:4px}
.sec-btn:hover{background:var(--bg-accent)}

.entitete-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:20px}
.e-karta{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:border-color .15s}
.e-karta:hover{border-color:var(--border-strong)}
.e-karta.varuh{border-left:2px solid #534AB7}
.e-karta.zmaj{border-left:2px solid #A32D2D}
.e-karta.duh{border-left:2px solid #085041}
.e-karta.boginja{border-left:2px solid #72243E}
.e-karta.sila{border-left:2px solid #854F0B}
.e-ikona{font-size:22px;margin-bottom:6px}
.e-ime{font-size:12px;font-weight:500;color:var(--text-primary)}
.e-tip{font-size:10px;color:var(--text-muted);margin-top:1px}
.e-modul{font-size:10px;color:var(--text-secondary);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;margin-top:5px}
.b-varuh{background:#EEEDFE;color:#3C3489}
.b-zmaj{background:#FCEBEB;color:#A32D2D}
.b-duh{background:#E1F5EE;color:#085041}
.b-boginja{background:#FBEAF0;color:#72243E}
.b-sila{background:#FAEEDA;color:#633806}

.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:20px}
.av-karta{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:12px}
.av-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.av-krog{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:1.5px solid var(--border-strong);flex-shrink:0}

.av-stopnja{font-size:10px;color:var(--text-muted)}

.av-trak{height:100%;border-radius:2px;background:var(--fill-pro);transition:width .4s}
.av-varuh{font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:4px}
.av-tocke{font-size:10px;color:var(--text-muted);margin-left:auto}

.seje-lista{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}

.seja-ikona{font-size:16px;flex-shrink:0}
.seja-info{flex:1;overflow:hidden}
.seja-kdo{font-size:12px;font-weight:500;color:var(--text-primary)}
.seja-cas{font-size:11px;color:var(--text-muted)}
.seja-varuh{font-size:11px;color:var(--text-secondary)}
.seja-dolzina{font-size:10px;color:var(--text-muted);background:var(--surface-1);padding:2px 8px;border-radius:10px;flex-shrink:0}

.sile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sila-karta{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:12px}
.sila-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sila-ikona{font-size:18px}
.sila-ime{font-size:12px;font-weight:500}
.sila-tip{font-size:10px;color:var(--text-muted)}
.sila-smer{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;margin-bottom:6px}
.smer-podziga{background:#E1F5EE;color:#085041}
.smer-zaustavi{background:#FCEBEB;color:#A32D2D}
.smer-preizkus{background:#FAEEDA;color:#633806}
.sila-opis{font-size:11px;color:var(--text-secondary);line-height:1.5}

.relikt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:20px}
.rel-karta{background:var(--surface-2);border:0.5px solid var(--border-strong);border-radius:12px;padding:10px;text-align:center}
.rel-ikona{font-size:24px;margin-bottom:4px}
.rel-ime{font-size:11px;font-weight:500;color:var(--text-primary)}
.rel-opis{font-size:10px;color:var(--text-muted);margin-top:3px;line-height:1.4}
.rel-lastnik{font-size:10px;color:var(--text-accent);margin-top:5px}
.rel-ziva{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--fill-success);margin-right:3px;vertical-align:middle}

.detail-panel{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.dp-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.dp-ikona{font-size:32px;line-height:1}
.dp-meta{flex:1}
.dp-ime{font-size:16px;font-weight:500;color:var(--text-primary)}
.dp-arh{font-size:12px;color:var(--text-muted)}
.dp-zavest{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:12px;border-left:2px solid var(--border-strong);padding-left:10px}
.dp-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.dp-chip{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--surface-1);color:var(--text-secondary);border:0.5px solid var(--border)}
.dp-chip.pos{color:#085041;background:#E1F5EE}
.dp-chip.neg{color:#A32D2D;background:#FCEBEB}

.edit-btn{padding:6px 14px;border-radius:var(--radius);background:var(--bg-pro);border:0.5px solid var(--border-pro);color:var(--text-pro);font-size:11px;cursor:pointer;transition:all .15s}
.edit-btn:hover{background:var(--fill-pro);color:#fff}
.add-btn{padding:6px 12px;border-radius:var(--radius);background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-secondary);font-size:11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.add-btn:hover{border-color:var(--border-strong);color:var(--text-primary)}

.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fchip{padding:4px 10px;border-radius:10px;font-size:11px;cursor:pointer;background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-secondary);transition:all .15s}
.fchip:hover{border-color:var(--border-strong)}
.fchip.a{background:var(--bg-pro);border-color:var(--border-pro);color:var(--text-pro)}
</style>

function preklopi(tab, el){
  aktivniTab=tab;
  aktivniDetail=null;
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('a'));
  if(el) el.classList.add('a');
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('a'));
  izrisi();
}

function prikaziDetail(id){
  aktivniDetail=id;
  aktivniTab='entitete';
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('a'));
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('a'));
  const v=VARUHI[id];
  if(v) event.currentTarget.classList.add('a');
  izrisi();
}

function izrisi(){
  const c=document.getElementById('vsebina');

    c.innerHTML=detailHtml(VARUHI[aktivniDetail]);

  if(aktivniTab==='pregled') c.innerHTML=pregledHtml();

  else if(aktivniTab==='avatarji') c.innerHTML=avatarjiHtml();
  else if(aktivniTab==='seje') c.innerHTML=sejeHtml();
  else if(aktivniTab==='sile') c.innerHTML=sileHtml();
  else if(aktivniTab==='relikvije') c.innerHTML=relikvijHtml();
}

function entiteteHtml(){
  const vsi=Object.values(VARUHI);

  <div class="filter-row">
    ${['vsi','varuh','duh','zmaj','boginja'].map(t=>`<button class="fchip${filter===t?' a':''}" onclick="filter='${t}';izrisi()">${t==='vsi'?'Vsi tipi':t}</button>`).join('')}
  </div>
  <div class="entitete-grid">
    ${filtrirani.map(v=>{
      const id=Object.keys(VARUHI).find(k=>VARUHI[k]===v);
