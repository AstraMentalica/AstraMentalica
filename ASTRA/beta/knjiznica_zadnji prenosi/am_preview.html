<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AstraMentalica</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07071a;--s1:#0d0d26;--s2:#12122e;
  --akc:232,200,74;
  --gold:rgb(var(--akc));--goldd:rgba(var(--akc),.13);--goldb:rgba(var(--akc),.35);--goldt:rgba(var(--akc),.06);
  --txt:#d4c5a9;--txt2:#8a7060;--txt3:#4a4535;--txts:#f0e8d5;
  --brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.13);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}
canvas#zvezde{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ══ LOGIN ══ */
#ekran-dobro{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,transform .8s}
#ekran-dobro.odhaja{opacity:0;transform:scale(1.05);pointer-events:none}
#mega-canvas{position:absolute;inset:0;pointer-events:none;z-index:1}
.dobro-v{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
.dobro-logo{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.35em;color:var(--txt3);text-transform:uppercase;margin-bottom:28px}
.dobro-sym{font-size:46px;color:var(--gold);margin-bottom:16px;animation:pulz 3s ease-in-out infinite;text-shadow:0 0 40px rgba(var(--akc),.3)}
@keyframes pulz{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.dobro-h1{font-family:'Cinzel',serif;font-size:28px;font-weight:400;letter-spacing:.06em;color:var(--txts);margin-bottom:4px;text-align:center}
.dobro-sub{font-size:14px;color:var(--txt2);font-style:italic;margin-bottom:40px;text-align:center}
.vinp input{
  width:290px;background:rgba(255,255,255,.04);border:1px solid var(--brd2);border-radius:10px;
  padding:12px 20px;color:var(--txts);font-family:'Crimson Pro',serif;font-size:16px;
  outline:none;text-align:center;transition:border-color .3s,box-shadow .3s;margin-bottom:10px;display:block;
}
.vinp input:focus{border-color:var(--goldb);box-shadow:0 0 0 3px rgba(var(--akc),.07)}
.vinp input::placeholder{color:var(--txt3)}
#gumb-vstop{
  width:290px;padding:13px;background:var(--goldd);border:1px solid var(--goldb);border-radius:10px;
  color:var(--gold);font-family:'Cinzel',serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;transition:all .3s;margin-top:4px;
}
#gumb-vstop:hover{background:rgba(var(--akc),.22)}
#gumb-vstop:disabled{opacity:.35;cursor:default}
.dobro-op{margin-top:14px;font-size:12px;color:var(--txt3);font-style:italic}
#meg-flash{position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0;transition:opacity .5s;
  background:radial-gradient(ellipse at center,rgba(var(--akc),.14) 0%,transparent 70%)}

/* ══ PLATFORMA ══ */
#ekran-plat{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .8s;padding-bottom:52px}
#ekran-plat.viden{opacity:1;pointer-events:all}

/* topbar */
#topbar{height:50px;background:rgba(7,7,26,.95);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;backdrop-filter:blur(12px);z-index:10}
#tb-logo{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.12em;color:var(--gold)}
.tbsep{width:1px;height:22px;background:var(--brd)}
.tb-link{background:none;border:none;cursor:pointer;padding:5px 9px;border-radius:6px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.05em;color:var(--txt2);transition:all .2s}
.tb-link:hover,.tb-link.akt{color:var(--gold);background:var(--goldt)}
#tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
#tb-ime{font-size:13px;color:var(--txt);font-style:italic}
#tb-avt{width:32px;height:32px;border-radius:50%;border:1px solid var(--goldb);overflow:hidden;position:relative;cursor:pointer}
#tb-avt canvas{position:absolute;inset:0}

/* grid */
#mreza{flex:1;overflow-y:auto;padding:16px;display:grid;gap:12px;grid-template-columns:repeat(var(--kol,3),1fr);align-content:start}
#mreza::-webkit-scrollbar{width:4px}
#mreza::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}

/* gradnik */
.grd{border:1px solid var(--brd);border-radius:12px;background:rgba(12,12,35,.88);backdrop-filter:blur(6px);display:flex;flex-direction:column;overflow:hidden;animation:pojavi .45s ease forwards;opacity:0}
@keyframes pojavi{to{opacity:1;transform:none}from{opacity:0;transform:translateY(8px)}}
.grd:hover{border-color:var(--brd2)}
.grd-h{padding:9px 12px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:7px;flex-shrink:0}
.grd-ico{font-size:15px}
.grd-ime{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.05em;color:var(--txts);flex:1}
.grd-tip{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt3)}
.grd-b{padding:11px;font-size:13px;line-height:1.7;color:var(--txt);flex:1}
/* teme */
.tf .grd-h{background:rgba(90,80,60,.1)}.tf .grd-ico{color:rgba(var(--akc),1)}
.tfo .grd-h{background:rgba(120,70,210,.1)}.tfo .grd-ico{color:#9c6fe4}
.tbl .grd-h{background:rgba(20,130,100,.1)}.tbl .grd-ico{color:#14a87a}
.tas .grd-h{background:rgba(210,140,30,.1)}.tas .grd-ico{color:#e8a032}
.ttar .grd-h{background:rgba(190,60,110,.1)}.ttar .grd-ico{color:#d25082}
.trn .grd-h{background:rgba(180,55,35,.1)}.trn .grd-ico{color:#c84632}
.tnu .grd-h{background:rgba(35,140,190,.1)}.tnu .grd-ico{color:#28a0d0}
.tav .grd-h{background:rgba(60,110,190,.1)}.tav .grd-ico{color:#508cd2}
.tma .grd-h{background:rgba(45,160,70,.1)}.tma .grd-ico{color:#3cb450}
.sp2{grid-column:span 2}.sp3{grid-column:span 3}.sp1{grid-column:span 1}
/* planet grid */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:11px;font-family:'JetBrains Mono',monospace}
.nit,.obj{border-bottom:1px solid var(--brd);padding:5px 0;cursor:pointer;transition:color .15s;font-size:13px}
.nit:last-child,.obj:last-child{border:none}
.nit:hover,.obj:hover{color:var(--txts)}
.nmeta{font-size:10px;color:var(--txt3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.objex{font-size:11px;color:var(--txt3);font-style:italic;margin-top:2px}
.avk{border:1px solid var(--brd);border-radius:7px;padding:7px 9px;margin-bottom:5px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .2s;font-size:12px}
.avk:hover,.avk.jaz{border-color:var(--goldb);background:var(--goldt)}
.avkr{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.karta{border:1px solid var(--brd2);border-radius:8px;padding:9px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:7px}
.karta:hover{border-color:var(--goldb);background:var(--goldt)}
/* avatar widget */
.avwgt{border:1px solid var(--goldb);border-radius:10px;padding:14px;background:var(--goldt);text-align:center}
.avwgt-c{width:120px;height:120px;border-radius:50%;margin:0 auto 10px;border:1px solid var(--goldb);overflow:hidden;position:relative}
.avwgt-c canvas{position:absolute;inset:0}
.avprogbar{height:3px;background:var(--brd2);border-radius:2px;margin-top:10px}
.avprog-f{height:100%;border-radius:2px;background:var(--gold);transition:width .5s}
/* aurelia map */
.aurmap{width:100%;height:90px;border:1px solid var(--brd);border-radius:8px;position:relative;overflow:hidden;cursor:pointer}
.aurr{position:absolute;border-radius:50%;opacity:.45;pointer-events:none}

/* ══ SPODNJA VRSTICA ══ */
#sv{
  position:fixed;bottom:0;left:0;right:0;height:52px;z-index:80;
  background:rgba(7,7,26,.97);border-top:1px solid var(--brd);
  display:flex;align-items:center;gap:0;backdrop-filter:blur(16px);
}
.sv-seg{
  display:flex;align-items:center;gap:6px;padding:0 14px;height:100%;
  border-right:1px solid var(--brd);cursor:pointer;transition:background .15s;
  font-size:12px;color:var(--txt2);
}
.sv-seg:hover{background:var(--goldt);color:var(--txt)}
.sv-seg:last-child{border:none}
.sv-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
.sv-label{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;text-transform:uppercase}
#sv-glasba-btn{font-size:16px;cursor:pointer;transition:color .2s}
#sv-glasba-btn.igra{color:var(--gold)}
#sv-vol{width:60px;height:3px;accent-color:rgb(var(--akc));cursor:pointer}
#sv-nastavitve{margin-left:auto;background:none;border:1px solid var(--brd);border-radius:6px;padding:5px 12px;color:var(--txt2);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.08em;cursor:pointer;margin-right:12px;transition:all .2s}
#sv-nastavitve:hover{border-color:var(--goldb);color:var(--gold)}
#sv-var-ime{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3)}

/* ══ NASTAVITVENI PANEL ══ */
#nav-panel{
  position:fixed;bottom:52px;left:0;right:0;z-index:70;
  background:rgba(8,8,24,.98);border-top:1px solid var(--goldb);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  max-height:380px;display:flex;flex-direction:column;backdrop-filter:blur(20px);
}
#nav-panel.odprt{transform:translateY(0)}
#nav-tabs{display:flex;border-bottom:1px solid var(--brd);flex-shrink:0}
.nav-tab{
  background:none;border:none;padding:10px 20px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--txt3);border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;
}
.nav-tab.akt{color:var(--gold);border-bottom-color:var(--gold)}
.nav-tab:hover{color:var(--txt)}
#nav-vsebina{flex:1;overflow-y:auto;padding:16px 20px}
#nav-vsebina::-webkit-scrollbar{width:4px}
#nav-vsebina::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
.nav-sekcija{margin-bottom:20px}
.nav-naslov{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);margin-bottom:10px}

/* BARVE */
.barve-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#barva-picker{width:40px;height:40px;border-radius:8px;border:1px solid var(--brd2);cursor:pointer;background:none;padding:2px}
.preset-barve{display:flex;gap:6px;flex-wrap:wrap}
.pb{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.pb:hover,.pb.akt{border-color:var(--txts);transform:scale(1.1)}
.barva-info{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt3)}
.hsl-vrstice{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.hsl-row{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--txt3)}
.hsl-row label{width:20px;font-family:'JetBrains Mono',monospace}
.hsl-row input[type=range]{flex:1;height:4px;accent-color:rgb(var(--akc));cursor:pointer}
.hsl-row span{width:28px;text-align:right;font-family:'JetBrains Mono',monospace}

/* GLASBA */
.glasba-sledi{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.gsl{
  border:1px solid var(--brd);border-radius:8px;padding:8px 12px;cursor:pointer;transition:all .2s;flex:1;min-width:100px;
  font-size:12px;text-align:center;
}
.gsl:hover{border-color:var(--brd2)}
.gsl.akt{border-color:var(--goldb);background:var(--goldt);color:var(--txts)}
.gsl-ime{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.05em;margin-bottom:2px}
.gsl-sub{font-size:10px;color:var(--txt3)}
.glasba-ctrl{display:flex;align-items:center;gap:12px}
.gc-btn{background:var(--goldt);border:1px solid var(--goldb);border-radius:8px;width:38px;height:38px;cursor:pointer;color:var(--gold);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.gc-btn:hover{background:rgba(var(--akc),.22)}
.gc-vol{display:flex;align-items:center;gap:8px;flex:1;font-size:12px;color:var(--txt3)}
.gc-vol input{flex:1;accent-color:rgb(var(--akc))}

/* VARIANTE */
.variante-grid{display:flex;gap:10px}
.varprev{
  border:1px solid var(--brd);border-radius:10px;padding:10px;cursor:pointer;
  transition:all .2s;flex:1;
}
.varprev:hover{border-color:var(--brd2)}
.varprev.akt{border-color:var(--goldb);background:var(--goldt)}
.varprev-ime{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.05em;color:var(--txts);margin-bottom:4px}
.varprev-sub{font-size:10px;color:var(--txt3);margin-bottom:8px}
.varprev-mini{height:60px;border-radius:5px;background:rgba(255,255,255,.03);border:1px solid var(--brd);overflow:hidden;display:grid;gap:2px;padding:3px}
.vmb{background:rgba(var(--akc),.15);border-radius:2px}
</style>
</head>
<body>
<canvas id="zvezde"></canvas>
<div id="meg-flash"></div>

<!-- ══ LOGIN ══ -->
<div id="ekran-dobro">
  <canvas id="mega-canvas"></canvas>
  <div class="dobro-v">
    <div class="dobro-logo">Kozmična šola zavesti</div>
    <div class="dobro-sym">✦</div>
    <h1 class="dobro-h1">AstraMentalica</h1>
    <p class="dobro-sub">Vstopi. Tvoja meglica te čaka.</p>
    <div class="vinp">
      <input id="vi-ime" type="text" placeholder="Tvoje ime..." maxlength="40" autocomplete="off">
      <input id="vi-geslo" type="password" placeholder="Geslo..." autocomplete="off">
    </div>
    <button id="gumb-vstop" disabled onclick="vstopi()">Vstopi v svet</button>
    <p class="dobro-op">Prvič tukaj? Vpis ustvari tvoj račun.</p>
  </div>
</div>

<!-- ══ PLATFORMA ══ -->
<div id="ekran-plat">
  <div id="topbar">
    <span id="tb-logo">✦ AstraMentalica</span>
    <div class="tbsep"></div>
    <button class="tb-link akt">Domov</button>
    <button class="tb-link">Nebo</button>
    <button class="tb-link">Simboli</button>
    <button class="tb-link">Svet</button>
    <button class="tb-link">Orakleum</button>
    <button class="tb-link">Skupnost</button>
    <div id="tb-r">
      <span id="tb-ime"></span>
      <div id="tb-avt"><canvas id="tb-mc" width="32" height="32"></canvas></div>
    </div>
  </div>
  <div id="mreza"></div>
</div>

<!-- ══ SPODNJA VRSTICA ══ -->
<div id="sv">
  <div class="sv-seg" onclick="odpriTab('barve')">
    <div class="sv-dot" id="sv-akc-dot"></div>
    <span class="sv-label">Barva</span>
  </div>
  <div class="sv-seg" onclick="preklopi_glasba()">
    <span id="sv-glasba-btn">♪</span>
    <span class="sv-label">Glasba</span>
    <input id="sv-vol" type="range" min="0" max="1" step=".05" value=".35" oninput="nastaviVol(this.value)" onclick="e=>e.stopPropagation()">
  </div>
  <div class="sv-seg" onclick="odpriTab('variante')">
    <span class="sv-var-ime" id="sv-var-ime">Kozmos</span>
    <span class="sv-label" style="margin-left:4px">Varianta</span>
  </div>
  <button id="sv-nastavitve" onclick="preklopi_panel()">⚙ Nastavitve</button>
</div>

<!-- ══ NASTAVITVENI PANEL ══ -->
<div id="nav-panel">
  <div id="nav-tabs">
    <button class="nav-tab akt" onclick="odpriTab('barve')">🎨 Barve</button>
    <button class="nav-tab" onclick="odpriTab('glasba')">♪ Glasba</button>
    <button class="nav-tab" onclick="odpriTab('variante')">◧ Variante</button>
  </div>
  <div id="nav-vsebina">

    <!-- BARVE -->
    <div id="tab-barve" class="nav-sekcija">
      <div class="nav-naslov">Poudarjena barva</div>
      <div class="barve-row">
        <input type="color" id="barva-picker" value="#e8c84a" oninput="nastaviBarvoHex(this.value)">
        <div class="preset-barve" id="preset-barve"></div>
        <span class="barva-info" id="barva-info">#e8c84a</span>
      </div>
      <div class="hsl-vrstice">
        <div class="hsl-row"><label>H</label><input type="range" id="h-sl" min="0" max="360" value="48" oninput="nastaviHSL()"><span id="h-v">48</span></div>
        <div class="hsl-row"><label>S</label><input type="range" id="s-sl" min="0" max="100" value="78" oninput="nastaviHSL()"><span id="s-v">78%</span></div>
        <div class="hsl-row"><label>L</label><input type="range" id="l-sl" min="10" max="90" value="56" oninput="nastaviHSL()"><span id="l-v">56%</span></div>
      </div>
    </div>

    <!-- GLASBA -->
    <div id="tab-glasba" class="nav-sekcija" style="display:none">
      <div class="nav-naslov">Ambient glasba</div>
      <div class="glasba-sledi" id="glasba-sledi"></div>
      <div class="glasba-ctrl">
        <button class="gc-btn" id="gc-play" onclick="preklopi_glasba()">▶</button>
        <div class="gc-vol">
          <span>🔈</span>
          <input type="range" id="gc-vol" min="0" max="1" step=".05" value=".35" oninput="nastaviVol(this.value)">
          <span>🔊</span>
        </div>
      </div>
      <div style="margin-top:10px;font-size:11px;color:var(--txt3);font-style:italic">Glasba se generira s Web Audio API — brez zunanjih virov.</div>
    </div>

    <!-- VARIANTE -->
    <div id="tab-variante" class="nav-sekcija" style="display:none">
      <div class="nav-naslov">Postavitev gradnikov</div>
      <div class="variante-grid" id="variante-grid"></div>
    </div>

  </div>
</div>

<script>
'use strict';
/* ───────────────────────────────────────
   STANJE
─────────────────────────────────────── */
const U={ime:'',hue:48,s:78,l:56};
let megDelci=[],tbDelci=[],avtDelci=[];
let panelOdprt=false;

/* ───────────────────────────────────────
   ZVEZDE
─────────────────────────────────────── */
(()=>{
  const c=document.getElementById('zvezde'),ctx=c.getContext('2d');
  let z=[];
  const init=()=>{c.width=window.innerWidth;c.height=window.innerHeight;z=Array.from({length:300},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*.8+.2,a:Math.random(),da:(Math.random()-.5)*.003}))};
  const loop=()=>{ctx.clearRect(0,0,c.width,c.height);z.forEach(s=>{s.a+=s.da;if(s.a<0||s.a>1)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,205,170,${s.a*.5+.1})`;ctx.fill()});requestAnimationFrame(loop)};
  init();window.addEventListener('resize',init);loop();
})();

/* ───────────────────────────────────────
   MEGLICA PARTICLES
─────────────────────────────────────── */
function mkDelce(cvs,n,hue,R){
  const d=[];
  for(let i=0;i<n;i++){
    const k=Math.random()*Math.PI*2,r=Math.random()*R;
    d.push({x:cvs.width/2+Math.cos(k)*r,y:cvs.height/2+Math.sin(k)*r,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,life:Math.random(),dl:(Math.random()*.007+.002)*(Math.random()>.5?1:-1),r:Math.random()*2.5+.5,k:Math.random()*Math.PI*2,dk:(Math.random()-.5)*.018,orb:r,hue,sat:35+Math.random()*25,svetl:55+Math.random()*20});
  }
  return d;
}
function animMeg(cvs,d,cx,cy,R,t){
  const ctx=cvs.getContext('2d');ctx.clearRect(0,0,cvs.width,cvs.height);
  d.forEach(p=>{
    p.k+=p.dk;p.life+=p.dl;if(p.life<0||p.life>1)p.dl*=-1;
    const tx=cx+Math.cos(p.k)*p.orb,ty=cy+Math.sin(p.k)*p.orb;
    p.x+=(tx-p.x)*.014+p.vx*.2;p.y+=(ty-p.y)*.014+p.vy*.2;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue+t*.08%360},${p.sat}%,${p.svetl}%,${p.life*.5})`;ctx.fill();
  });
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.45);
  g.addColorStop(0,`hsla(${U.hue},${U.s}%,${U.l+15}%,.16)`);g.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,cy,R*.45,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function hslToHex(h,s,l){
  l/=100;const a=s*Math.min(l,1-l)/100;
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};
  return`#${f(0)}${f(8)}${f(4)}`;
}
function hexToHSL(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;
  if(max===min){h=s=0}else{const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
  switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function aplicirBarvo(h,s,l){
  U.hue=h;U.s=s;U.l=l;
  // RGB iz HSL za CSS var
  const hex=hslToHex(h,s,l);
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--akc',`${r},${g},${b}`);
  // posodobi UI
  document.getElementById('barva-info').textContent=hex;
  document.getElementById('barva-picker').value=hex;
  document.getElementById('h-sl').value=h;document.getElementById('s-sl').value=s;document.getElementById('l-sl').value=l;
  document.getElementById('h-v').textContent=h;document.getElementById('s-v').textContent=s+'%';document.getElementById('l-v').textContent=l+'%';
  document.getElementById('sv-akc-dot').style.background=hex;
  // rebarva meglice
  [megDelci,tbDelci,avtDelci].forEach(arr=>arr.forEach(p=>{p.hue=h+(Math.random()*20-10)}));
  // posodobi preset oznak
  document.querySelectorAll('.pb').forEach(el=>el.classList.toggle('akt',el.dataset.h==h&&el.dataset.s==s&&el.dataset.l==l));
  // posodobi progress bar avatarja
  const pb=document.querySelector('.avprog-f');if(pb)pb.style.background=`hsl(${h},${s}%,${l}%)`;
}

const SLEDI=[
  {ime:'Kozmični dron',sub:'432 Hz · harmoniki',freqs:[432,648,864,1296],gains:[.22,.1,.06,.03],lfof:[.08,.12,.07,.1]},
  {ime:'Lunarna',sub:'528 Hz · tišina',freqs:[528,264,396],gains:[.12,.08,.05],lfof:[.04,.06,.03]},
  {ime:'Ritual',sub:'108 Hz · pulz',freqs:[108,216,324],gains:[.18,.08,.04],lfof:[.5,.3,.2]},
];
let audioCtx=null,masterGain=null,oscNodi=[],aktivnaSlед=0,glasbaIgra=false;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=.35;masterGain.connect(audioCtx.destination);
}
function ustavi_audio(){oscNodi.forEach(n=>{try{n.stop()}catch(e){}});oscNodi=[]}
function zageni_sled(idx){
  initAudio();ustavi_audio();aktivnaSlед=idx;
  const sl=SLEDI[idx];
  sl.freqs.forEach((f,i)=>{
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain(),lfo=audioCtx.createOscillator(),lg=audioCtx.createGain();
    osc.frequency.value=f;osc.type='sine';g.gain.value=sl.gains[i];
    lfo.frequency.value=sl.lfof[i];lfo.type='sine';lg.gain.value=sl.gains[i]*.25;
    lfo.connect(lg);lg.connect(g.gain);osc.connect(g);g.connect(masterGain);
    osc.start();lfo.start();oscNodi.push(osc,lfo);
  });
  glasbaIgra=true;posodobiGlasbaUI();
}
function preklopi_glasba(){
  if(glasbaIgra){ustavi_audio();glasbaIgra=false;posodobiGlasbaUI()}
  else zageni_sled(aktivnaSlед);
}
function nastaviVol(v){
  initAudio();if(masterGain)masterGain.gain.value=+v;
  document.getElementById('sv-vol').value=v;document.getElementById('gc-vol').value=v;
}

  const btn=document.getElementById('sv-glasba-btn'),pbtn=document.getElementById('gc-play');

  if(pbtn)pbtn.textContent=glasbaIgra?'⏸':'▶';
  document.querySelectorAll('.gsl').forEach((el,i)=>el.classList.toggle('akt',i===aktivnaSlед&&glasbaIgra));
}

  mreza.innerHTML='';
  const v=VARIANTE[aktivnaVar];
  mreza.style.setProperty('--kol',v.kol);

  // Avatar vedno na vrhu (span 3 ali 2)
  const idji=['codex_avt',...v.gradniki.filter(g=>g!=='codex_avt')];

  idji.forEach((id,i)=>{
    const def=GDEF[id];if(!def)return;
    const el=document.createElement('div');
    // span logika
    let sp='';
    if(id==='codex_avt')sp=v.kol===3?'sp3':v.kol===2?'sp2':'sp1';
    else if(id==='aurelia')sp=v.kol>=3?'sp3':v.kol===2?'sp2':'';
    else if(id==='celestaro'&&v.kol===3)sp='sp2';
    el.className=`grd ${def.cls} ${sp}`;
    el.style.animationDelay=(i*.07)+'s';
    el.innerHTML=`<div class="grd-h"><span class="grd-ico">${def.ico}</span><span class="grd-ime">${def.ime}</span><span class="grd-tip">${def.tip}</span></div><div class="grd-b">${def.html()}</div>`;
    mreza.appendChild(el);
  });
  setTimeout(zacniAvt,150);
}
</script>
</body>
</html>
