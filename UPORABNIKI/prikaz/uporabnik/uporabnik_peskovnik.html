<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraMentalica – Osebni Peskovnik</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a14;--panel:rgba(255,255,255,0.04);--brd:rgba(255,255,255,0.1);
  --txt:#e8e0d0;--txt2:rgba(255,255,255,0.5);--txt3:rgba(255,255,255,0.3);
  --zlata:#e8c84a;--vijola:#8b5cf6;--cyan:#22d3ee;--roza:#ec4899;--zelena:#10b981;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif}
#app{display:grid;grid-template-columns:240px 1fr 260px;height:100vh;gap:0}

/* PANELS */
.panel{background:var(--panel);border:0.5px solid var(--brd);border-radius:12px;padding:12px}
.gumb{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;color:var(--txt);cursor:pointer;font-size:12px;padding:6px 10px;transition:all .2s;font-family:inherit}
.gumb:hover{background:rgba(255,255,255,0.12)}
.gumb.aktiven{background:rgba(139,92,246,0.3);border-color:var(--vijola);color:#c4b5fd}
.gumb-zlat{background:rgba(232,200,74,0.15);border-color:rgba(232,200,74,0.4);color:var(--zlata)}
.gumb-zlat:hover{background:rgba(232,200,74,0.25)}
input[type=text],textarea,select{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--txt);font-size:12px;outline:none;padding:6px 10px;width:100%;font-family:inherit}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--vijola)}
select option{background:#1a1a2e}

/* LEFT SIDEBAR */
#leva{padding:12px;display:flex;flex-direction:column;gap:8px;border-right:0.5px solid var(--brd);overflow-y:auto}
#leva::-webkit-scrollbar{width:4px}
#leva::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* CENTER */
#sredina{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#toolbar{padding:8px 12px;border-bottom:0.5px solid var(--brd);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
#widget-area{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;align-content:start}
#widget-area::-webkit-scrollbar{width:6px}
#widget-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

/* RIGHT SIDEBAR */
#desna{padding:12px;display:flex;flex-direction:column;gap:8px;border-left:0.5px solid var(--brd);overflow-y:auto}
#desna::-webkit-scrollbar{width:4px}
#desna::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* WIDGET */
.widget{background:var(--panel);border:0.5px solid var(--brd);border-radius:12px;padding:12px;cursor:move;transition:all .2s;position:relative}
.widget:hover{border-color:rgba(255,255,255,0.2)}
.widget.dragging{opacity:0.5;transform:scale(0.95)}
.widget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.widget-title{font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.widget-remove{width:20px;height:20px;border-radius:50%;background:rgba(239,68,68,0.2);border:none;color:#ef4444;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.widget:hover .widget-remove{opacity:1}
.widget-body{font-size:11px;color:var(--txt2);line-height:1.6}

/* AVATAR */
#avatar-canvas{width:80px;height:80px;border-radius:50%;display:block;margin:0 auto 8px}
#avatar-ime{font-size:14px;font-weight:500;text-align:center;margin-bottom:2px}
#avatar-stopnja{font-size:10px;color:var(--txt2);text-align:center}

/* XP BAR */
.xp-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:6px}
.xp-bar-inner{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--vijola),var(--zlata));transition:width .5s}

/* MODULI LIST */
.modul-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;background:rgba(0,0,0,0.15);transition:background .2s;font-size:11px}
.modul-item:hover{background:rgba(255,255,255,0.05)}
.modul-item.aktiven{background:rgba(139,92,246,0.2)}
.modul-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* CHAT */
#chat-messages{height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:4px}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.msg{max-width:80%;padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.6}
.msg-user{margin-left:auto;background:rgba(139,92,246,0.3);border-radius:12px 12px 4px 12px}
.msg-ai{margin-right:auto;background:rgba(255,255,255,0.07);border-radius:12px 12px 12px 4px}

/* MEDITACIJA */
#meditacija-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#meditacija-overlay.aktiven{display:flex}
#meditacija-cas{font-size:48px;font-weight:300;color:var(--vijola);font-family:'Cinzel',serif}
#meditacija-besedilo{font-size:14px;color:var(--txt2);text-align:center;max-width:400px;line-height:1.8}

/* ANIMACIJE */
@keyframes pulsiraj{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}
.pulsiraj{animation:pulsiraj 3s ease-in-out infinite}

/* RESPONSIVE */
@media(max-width:900px){
  #app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
  #leva,#desna{max-height:30vh;border:none;border-bottom:0.5px solid var(--brd)}
}
</style>
</head>

<!-- MEDITACIJA OVERLAY -->

const KONFIG = {

  ollama_url: 'http://localhost:11434/api/chat',
  uporabnik_id: 'up_' + Math.random().toString(36).slice(2,9),
};

// ─── MODULI ──────────────────────────────────────────────

  {id:'rune',ime:'Rune ᚱ',barva:'#6ee7b7',opis:'Svet run',widget:'runa_dneva'},

  {id:'chakrarium',ime:'Chakrarium 🔮',barva:'#8b5cf6',opis:'Čakre in energija',widget:'meditacija'},
];

  {sim:'ᚠ',ime:'Fehu',pomen:'Bogastvo',barva:'#e8c84a',opis:'Fehu prinaša materialno obilje in ustvarjalno moč.'},
  {sim:'ᚢ',ime:'Uruz',pomen:'Moč',barva:'#ef4444',opis:'Uruz je sila divjega bika – neukrotljiva moč in zdravje.'},

  {sim:'ᛒ',ime:'Berkano',pomen:'Ljubezen',barva:'#ec4899',opis:'Berkano je breza – runa materinske ljubezni.'},

const TAROT = [
  {ime:'Gospodar',ikona:'0',barva:'#e8c84a',opis:'Začetek poti, nevednost, potencial.'},
  {ime:'Mag',ikona:'I',barva:'#8b5cf6',opis:'Ustvarjalnost, moč, manifestacija.'},
  {ime:'Velika Duha',ikona:'II',barva:'#22d3ee',opis:'Intuicija, skrita modrost, podzavest.'},
  {ime:'Cesarica',ikona:'III',barva:'#ec4899',opis:'Rodu, plodnost, naravna rast.'},
  {ime:'Cesar',ikona:'IV',barva:'#ef4444',opis:'Avtoriteta, struktura, oblast.'},
  {ime:'Hieronfant',ikona:'V',barva:'#fcd34d',opis:'Tradicija, učenje, duhovna vodja.'},
  {ime:'Ljubezenska',ikona:'VI',barva:'#ec4899',opis:'Ljubezen, harmonija, odnosi.'},
  {ime:'Voz',ikona:'VII',barva:'#f59e0b',opis:'Gibanje, napredek, volja.'},
  {ime:'Moč',ikona:'VIII',barva:'#ef4444',opis:'Notranja moč, potrpežljivost, strast.'},
  {ime:'Papež',ikona:'IX',barva:'#8b5cf6',opis:'Modrost, duhovnost, nasvete.'},
];

const VERZI = [
  {bes:'"Poti tisoč korakov se začne z enim korakom." – Laozi',barva:'#10b981'},
  {bes:'"Znanje je moč." – Francis Bacon',barva:'#8b5cf6'},
  {bes:'"Naj bo tvoja modrost zmeraj v ravnovesju."',barva:'#22d3ee'},
  {bes:'"V vsakem delu narave je skrita modrost."',barva:'#10b981'},
  {bes:'"Svetloba bo vedno premagala temo."',barva:'#fcd34d'},
];

// ─── STANJE ──────────────────────────────────────────────
let stanje = {
  profil:{ime:'Meglica',spol:'nevtralen',arhetip:'modrec',barva:'#8b5cf6'},
  xp:0, stopnja:0,
  widgeti:['runa_dneva','tarot_dneva','meditacija'],
  model:'llama',
  chat_sporocila:[],
  otrok_nacin:false,
};

// ─── INIT ────────────────────────────────────────────────
function init(){
  nalozi_profil();
  init_avatar();
  init_moduli();
  init_barve_avre();
  osvezi_widgete();
  osvezi_chat();
  document.getElementById('p-ime').value = stanje.profil.ime;
  document.getElementById('p-spol').value = stanje.profil.spol;
  document.getElementById('p-arhetip').value = stanje.profil.arhetip;
}

// ─── PROFIL ──────────────────────────────────────────────
function nalozi_profil(){
  try{
    const shranjeno = localStorage.getItem('peskovnik_profil');
    if(shranjeno) stanje = {...stanje, ...JSON.parse(shranjeno)};
  }catch(e){console.log('Napaka pri nalaganju profila')}
}

function shrani_profil(){
  stanje.profil.ime = document.getElementById('p-ime').value || 'Meglica';
  stanje.profil.spol = document.getElementById('p-spol').value;
  stanje.profil.arhetip = document.getElementById('p-arhetip').value;
  try{
    localStorage.setItem('peskovnik_profil', JSON.stringify(stanje));
  }catch(e){console.log('Napaka pri shranjevanju')}
  osvezi_avatar();
  // Pošlji na strežnik
  posodobi_streznik();
}

async function posodobi_streznik(){
  try{
    await fetch(KONFIG.api_url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({akcija:'shrani_profil',profil:stanje.profil,xp:stanje.xp,uporabnik_id:KONFIG.uporabnik_id})
    });
  }catch(e){console.log('Strežnik ni dosegljiv')}
}

// ─── AVATAR ──────────────────────────────────────────────
function init_avatar(){
  const c=document.getElementById('avatar-canvas');
  const ctx=c.getContext('2d');
  function draw(){
    ctx.clearRect(0,0,80,80);
    const t=Date.now()*0.002;
    const b=stanje.profil.barva;
    // Avra
    for(let i=3;i>0;i--){
      ctx.beginPath();ctx.arc(40,40,28+i*4+Math.sin(t+i)*2,0,Math.PI*2);
      ctx.fillStyle=b+Math.round(15/i).toString(16).padStart(2,'0');ctx.fill();
    }
    // Glava
    const g=ctx.createRadialGradient(36,36,3,40,40,22);
    g.addColorStop(0,'rgba(255,255,255,0.95)');g.addColorStop(0.5,b+'bb');g.addColorStop(1,b+'33');
    ctx.beginPath();ctx.arc(40,40,22,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    requestAnimationFrame(draw);
  }
  draw();
}

function osvezi_avatar(){
  document.getElementById('avatar-ime').textContent=stanje.profil.ime;
  document.getElementById('avatar-stopnja').textContent=`${get_emoticon()} ${stanje.profil.ime} · ${stanje.xp} XP`;
  document.getElementById('xp-bar').style.width=Math.min(100,get_xp_procent())+'%';
}

function get_emoticon(){
  if(stanje.xp<100)return '🌫️';
  if(stanje.xp<300)return '✨';
  if(stanje.xp<600)return '🌱';
  if(stanje.xp<1000)return '🌿';
  if(stanje.xp<1500)return '🌸';
  if(stanje.xp<2200)return '🌳';
  if(stanje.xp<3000)return '⭐';
  return '☀️';
}

function get_xp_procent(){
  const st=[0,100,300,600,1000,1500,2200,3000];
  const cur=st.filter(s=>stanje.xp>=s).pop()||0;
  const nxt=st.find(s=>s>stanje.xp)||3000;
  return nxt>cur?Math.round(((stanje.xp-cur)/(nxt-cur))*100):100;
}

function dodaj_xp(kol){
  stanje.xp+=kol;
  osvezi_avatar();
  shrani_profil();
}

// ─── MODULI ──────────────────────────────────────────────
function init_moduli(){
  const l=document.getElementById('moduli-list');l.innerHTML='';
  MODULI.forEach(m=>{
    const d=document.createElement('div');
    d.className='modul-item'+(stanje.widgeti.includes(m.widget)?' aktiven':'');
    d.innerHTML=`<div class="modul-dot" style="background:${m.barva}"></div><span style="flex:1">${m.ime}</span><span style="font-size:9px;color:${stanje.widgeti.includes(m.widget)?m.barva:'var(--txt3)'}">${stanje.widgeti.includes(m.widget)?'ON':'OFF'}</span>`;
    d.onclick=()=>{
      const idx=stanje.widgeti.indexOf(m.widget);
      if(idx>=0)stanje.widgeti.splice(idx,1);else stanje.widgeti.push(m.widget);
      init_moduli();osvezi_widgete();shrani_profil();
    };
    l.appendChild(d);
  });
}

function init_barve_avre(){
  const g=document.getElementById('barve-avre');g.innerHTML='';
  ['#8b5cf6','#22d3ee','#e8c84a','#ec4899','#10b981','#ef4444','#3b82f6','#f97316'].forEach(b=>{
    const d=document.createElement('div');
    d.style.cssText=`width:18px;height:18px;border-radius:50%;background:${b};cursor:pointer;border:${stanze.profil.barva===b?'2px solid #fff':'2px solid transparent'};transition:all .2s`;
    d.onclick=()=>{stanze.profil.barva=b;init_barve_avre();shrani_profil()};
    g.appendChild(d);
  });
}

// ─── WIDGETI ─────────────────────────────────────────────
function osvezi_widgete(){
  const area=document.getElementById('widget-area');area.innerHTML='';
  stanze.widgeti.forEach(w=>{
    const widget=kreiraj_widget(w);
    if(widget)area.appendChild(widget);
  });
}

function kreiraj_widget(tip){
  const w=document.createElement('div');
  w.className='widget';w.draggable=true;
  switch(tip){
    case 'runa_dneva':w.innerHTML=widget_runa();break;
    case 'tarot_dneva':w.innerHTML=widget_tarot();break;
    case 'verz_dneva':w.innerHTML=widget_verz();break;
    case 'stevilo_dneva':w.innerHTML=widget_stevilo();break;
    case 'meditacija':w.innerHTML=widget_meditacija();break;
    default:w.innerHTML=widget_prazno(tip);break;
  }
  w.querySelector('.widget-remove').onclick=(e)=>{e.stopPropagation();odstrani_widget(tip)};
  // Drag & drop
  w.addEventListener('dragstart',()=>w.classList.add('dragging'));
  w.addEventListener('dragend',()=>w.classList.remove('dragging'));
  return w;
}

function widget_runa(){
  const r=RUNE[Math.floor(Math.random()*RUNE.length)];
  return `<div class="widget-header"><div class="widget-title"><span style="color:${r.barva};font-size:20px">${r.sim}</span> Runa dneva</div><button class="widget-remove">×</button></div><div class="widget-body"><div style="font-size:10px;color:${r.barva};margin-bottom:4px">${r.ime} – ${r.pomen}</div><div style="font-size:11px;color:var(--txt2);line-height:1.5">${r.opis}</div><button class="gumb" onclick="dodaj_xp(10)" style="margin-top:8px;font-size:10px">+10 XP</button></div>`;
}

function widget_tarot(){
  const t=TAROT[Math.floor(Math.random()*TAROT.length)];
  return `<div class="widget-header"><div class="widget-title">🃏 ${t.ime}</div><button class="widget-remove">×</button></div><div class="widget-body"><div style="font-size:10px;color:${t.barva};margin-bottom:4px">${t.ikona} ${t.ime}</div><div style="font-size:11px;color:var(--txt2);line-height:1.5">${t.opis}</div><button class="gumb" onclick="dodaj_xp(10)" style="margin-top:8px;font-size:10px">+10 XP</button></div>`;
}

function widget_verz(){
  const v=VERZI[Math.floor(Math.random()*VERZI.length)];
  return `<div class="widget-header"><div class="widget-title">📜 Verz dneva</div><button class="widget-remove">×</button></div><div class="widget-body"><div style="font-size:12px;color:${v.barva};line-height:1.6;font-style:italic">${v.bes}</div><button class="gumb" onclick="dodaj_xp(5)" style="margin-top:8px;font-size:10px">+5 XP</button></div>`;
}

function widget_stevilo(){
  const n=Math.floor(Math.random()*100);
  const pomen=n%3===0?'Rast':n%3===1?'Sprememba':'Uravnoteženje';
  return `<div class="widget-header"><div class="widget-title">🔢 Število dneva</div><button class="widget-remove">×</button></div><div class="widget-body"><div style="font-size:32px;font-weight:300;color:var(--zlata);text-align:center;margin:8px 0">${n}</div><div style="font-size:10px;color:var(--txt2);text-align:center">${pomen}</div><button class="gumb" onclick="dodaj_xp(5)" style="margin-top:8px;font-size:10px">+5 XP</button></div>`;
}

function widget_meditacija(){
  return `<div class="widget-header"><div class="widget-title">🧘 Meditacija</div><button class="widget-remove">×</button></div><div class="widget-body"><div style="font-size:11px;color:var(--txt2);margin-bottom:8px">Hitra meditacija za 1-5 minut.</div><div style="display:flex;gap:4px;flex-wrap:wrap">${[1,3,5].map(m=>`<button class="gumb" onclick="zaženi_meditacijo(${m})" style="font-size:10px">${m} min</button>`).join('')}</div></div>`;
}

function widget_prazno(tip){
  return `<div class="widget-header"><div class="widget-title">${tip}</div><button class="widget-remove">×</button></div><div class="widget-body"><div style="font-size:11px;color:var(--txt3)">Prazen widget</div></div>`;
}

function dodaj_widget(){
  const neuporabljeni=MODULI.filter(m=>!stanje.widgeti.includes(m.widget));
  if(neuporabljeni.length===0){alert('Vsi moduli so že dodani!');return}
  const m=neuporabljeni[Math.floor(Math.random()*neuporabljeni.length)];
  stanje.widgeti.push(m.widget);
  osvezi_widgete();shrani_profil();
}

function odstrani_widget(tip){
  const idx=stanze.widgeti.indexOf(tip);
  if(idx>=0){stanze.widgeti.splice(idx,1);osvezi_widgete();shrani_profil()}
}

function prikazi_widget(filter){
  document.querySelectorAll('[data-w]').forEach(b=>b.classList.toggle('aktiven',b.dataset.w===filter));
  // TODO: filtriranje widgetov
}

// ─── MEDITACIJA ──────────────────────────────────────────
let meditacija_timer=null;
function zaženi_meditacijo(min){
  const overlay=document.getElementById('meditacija-overlay');
  const cas=document.getElementById('meditacija-cas');
  const besedilo=document.getElementById('meditacija-besedilo');
  overlay.classList.add('aktiven');
  let preostalo=min*60;
  cas.textContent=formatiraj_cas(preostalo);
  besedilo.innerHTML=get_meditacija_besedilo(min);
  meditacija_timer=setInterval(()=>{
    preostalo--;
    cas.textContent=formatiraj_cas(preostalo);
    if(preostalo<=0){zaustavi_meditacijo();dodaj_xp(min*10)}
  },1000);
}

function zaustavi_meditacijo(){
  clearInterval(meditacija_timer);
  document.getElementById('meditacija-overlay').classList.remove('aktiven');
}

function formatiraj_cas(s){
  const m=Math.floor(s/60);
  const sec=s%60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function get_meditacija_besedilo(min){
  const besedila={
    1:'Sprejmi svoj dih...<br>3 vdihi, 3 izdihi...<br>Čutim mir.',
    3:'Sedi udobno...<br>Zapri oči...<br>Sprejmi svoj dih...<br>Pusti da se um umiri...<br>Čutim prisotnost.',
    5:'Poišči mirnoto mesto...<br>Zapri oči...<br>Sprejmi svoj dih...<br>Opazuj misli brez ocenjevanja...<br>Pusti da odidejo...<br>Vrnitev v sedanjost...<br>Hvala.'
  };
  return besedila[min]||besedila[3];
}

// ─── HITRE FUNKCIJE ──────────────────────────────────────
function runa_dneva(){
  const r=RUNE[Math.floor(Math.random()*RUNE.length)];
  dodaj_widget_na_desko('runa_dneva');
  dodaj_xp(10);
}

function tarot_dneva(){
  dodaj_widget_na_desko('tarot_dneva');
  dodaj_xp(10);
}

function verz_dneva(){
  dodaj_widget_na_desko('verz_dneva');
  dodaj_xp(5);
}

function dodaj_widget_na_desko(tip){
  if(!stanze.widgeti.includes(tip)){stanze.widgeti.push(tip);osvezi_widgete();shrani_profil()}
}

// ─── AI ASISTENT ─────────────────────────────────────────
function izberi_model(model){
  stanje.model=model;
  document.getElementById('model-llama').classList.toggle('aktiven',model==='llama');
  document.getElementById('model-gemma').classList.toggle('aktiven',model==='gemma');
  shrani_profil();
}

async function posli_chat(){
  const vnos=document.getElementById('chat-vnos');
  const bes=vnos.value.trim();
  if(!bes||stanze.nalaganje)return;
  vnos.value='';
  dodaj_chat_sporocilo('user',bes);
  stanze.nalaganje=true;
  try{
    const r=await fetch(KONFIG.api_url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({akcija:'ai_chat',sporocilo:bes,model:stanze.model,uporabnik_id:KONFIG.uporabnik_id})
    });
    const data=await r.json();
    if(data.status==='uspeh'){
      dodaj_chat_sporocilo('ai',data.odgovor);
    }else{
      dodaj_chat_sporocilo('ai','[Napaka: '+data.sporocilo+']');
    }
  }catch(e){
    dodaj_chat_sporocilo('ai','[Povezava z AI ni uspela]');
  }
  stanze.nalaganje=false;
}

function dodaj_chat_sporocilo(vloga,bes){
  const c=document.getElementById('chat-messages');
  const d=document.createElement('div');
  d.className='msg '+(vloga==='user'?'msg-user':'msg-ai');
  d.textContent=bes;
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
  stanze.chat_sporocila.push({vloga,bes});
}

function osvezi_chat(){
  const c=document.getElementById('chat-messages');c.innerHTML='';
  stanze.chat_sporocila.forEach(s=>dodaj_chat_sporocilo(s.vloga,s.bes));
}

// ─── NASTAVITVE ──────────────────────────────────────────
function odpri_nastavitve(){
  const tema=prompt('Vnesi CSS za prilagoditev (npr. background: #1a0a2e):');
  if(tema){
    document.documentElement.style.setProperty('--bg',tema);
    shrani_profil();
  }
}

// ─── OPENCLAW ENDPOINT ───────────────────────────────────
// Tukaj OpenClaw pošilja ukaze od DeepSeek
// Primer: {akcija:'openclaw',ukaz:'dodaj_widget',parametri:{tip:'runa_dneva'}}
async function prejmi_openclaw_ukaz(ukaz){
  console.log('OpenClaw ukaz:',ukaz);
  switch(ukaz.akcija){
    case 'dodaj_widget':
      dodaj_widget_na_desko(ukaz.parametri.tip);
      break;
    case 'zaženi_meditacijo':
      zaženi_meditacijo(ukaz.parametri.min);
      break;
    case 'postavi_profil':
      Object.assign(stanze.profil,ukaz.parametri.profil);
      osvezi_avatar();shrani_profil();
      break;
    case 'ai_chat':
      dodaj_chat_sporocilo('ai',ukaz.parametri.odgovor);
      break;
  }
}

// ─── START ───────────────────────────────────────────────
window.addEventListener('load',init);
window.addEventListener('storage',init);
</script>
